/* =========================================================================
   ROLLING
   ========================================================================= */
function buildTumbleWaypoints(startQuat, sides, finalSolver) {
  const waypointCount = sides === 2 ? 14 : 7;
  const quats = [startQuat];
  let current = startQuat;

  const FLIP_BIAS = 0.18;

  for (let i = 0; i < waypointCount; i++) {
    const axis = [rollFloat(-1, 1), rollFloat(-1, 1), rollFloat(-1, 1) * FLIP_BIAS];
    const len = Math.hypot(...axis) || 1;
    const axisN = axis.map((v) => v / len);
    const angle = rollFloat(140, 260);
    const step = quatFromAxisAngle(axisN, angle);
    current = quatMultiply(step, current);
    quats.push(current);
  }
  const finalQuat = finalSolver(current);
  quats.push(finalQuat);
  return quats;
}

function solveSettleFromQuat(currentQuat, faceNormal, faceUp, faceDown) {
  const currentMat = quatToMatrix(currentQuat);
  const target = faceDown ? [0, 0, -1] : [0, 0, 1];
  const targetUp = [0, 1, 0];

  const curNormal = applyMatrixToVector(currentMat, faceNormal);
  const curUp = applyMatrixToVector(currentMat, faceUp);

  const settleMat = rotationToAlign(curNormal, target);
  const settleQuat = matrixToQuaternion(settleMat);
  const settledUp = applyMatrixToVector(settleMat, curUp);

  const axisRef = faceDown ? [0, 0, -1] : [0, 0, 1];
  const dotST = settledUp[0]*axisRef[0] + settledUp[1]*axisRef[1] + settledUp[2]*axisRef[2];
  const proj = settledUp.map((v, idx) => v - dotST * axisRef[idx]);
  const projLen = Math.hypot(...proj) || 1;
  const projN = proj.map((v) => v / projLen);
  const twistMat = rotationAroundAxis(axisRef, projN, targetUp);
  const twistQuat = matrixToQuaternion(twistMat);

  return quatMultiply(twistQuat, quatMultiply(settleQuat, currentQuat));
}

function quatAngleBetween(a, b) {
  let dot = a[0]*b[0] + a[1]*b[1] + a[2]*b[2] + a[3]*b[3];
  dot = Math.min(1, Math.abs(dot));
  return 2 * Math.acos(dot);
}

function easeOutSettle(t) { return 1 - Math.pow(1 - t, 3); }
function easeInOutTumble(t) {
  const smooth = t * t * (3 - 2 * t);
  const blend = 0.25;
  return (1 - blend) * t + blend * smooth;
}

function buildRollAnimState(die, waypoints, totalDurationMs) {
  const legCount = waypoints.length - 1;
  const tumbleLegCount = legCount - 1;

  const finalLegShare = 0.32;
  const tumbleTotalMs = totalDurationMs * (1 - finalLegShare);
  const finalLegDuration = totalDurationMs * finalLegShare;

  const tumbleAngles = [];
  let angleSum = 0;
  for (let i = 0; i < tumbleLegCount; i++) {
    const a = quatAngleBetween(waypoints[i], waypoints[i + 1]);
    tumbleAngles.push(a);
    angleSum += a;
  }
  const legDurations = tumbleAngles.map((a) =>
    angleSum > 0 ? (a / angleSum) * tumbleTotalMs : tumbleTotalMs / tumbleLegCount
  );
  legDurations.push(finalLegDuration);

  return {
    die,
    waypoints,
    legDurations,
    legCount,
    legIndex: 0,
    legStart: 0,
    done: false,
  };
}

function stepRollAnim(state, now) {
  if (state.done) return;
  const { die, waypoints, legDurations, legCount } = state;
  const elapsed = now - state.legStart;
  const dur = legDurations[state.legIndex];
  const t = Math.min(1, elapsed / dur);
  const isFinalLeg = state.legIndex === legCount - 1;
  const easedT = isFinalLeg ? easeOutSettle(t) : easeInOutTumble(t);
  const q = quatSlerp(waypoints[state.legIndex], waypoints[state.legIndex + 1], easedT);
  die.currentQuat = q;

  if (t >= 1) {
    state.legIndex++;
    state.legStart = now;
    if (state.legIndex >= legCount) {
      die.currentQuat = waypoints[waypoints.length - 1];
      state.done = true;
    }
  }
}

function runRollAnimations(states, onAllDone) {
  const now0 = performance.now();
  states.forEach((s) => { s.legStart = now0; });

  function frame(now) {
    let anyRunning = false;
    states.forEach((s) => {
      if (!s.done) {
        stepRollAnim(s, now);
        if (!s.done) anyRunning = true;
      }
    });
    renderDiceCanvas();
    if (anyRunning) {
      requestAnimationFrame(frame);
    } else {
      onAllDone();
    }
  }
  requestAnimationFrame(frame);
}

function animateTumbleAndSettle(diceToRoll, onAllSettled) {
  const results = diceToRoll.map((d) => {
    d.settled = false;
    const value = rollDie(d.sides === 100 ? 10 : d.sides);
    let label, displayValue;
    if (d.sides === 100) {
      displayValue = value === 10 ? 0 : value * 10;
      label = value === 10 ? '00' : String(value * 10);
    } else if (d.sides === 10 && !d.isPercentileUnit) {
      displayValue = value === 10 ? 10 : value;
      label = value === 10 ? '10' : String(value);
    } else if (d.sides === 10 && d.isPercentileUnit) {
      displayValue = value === 10 ? 0 : value;
      label = value === 10 ? '0' : String(value);
    } else {
      displayValue = value;
      label = String(value);
    }
    return { value: displayValue, label };
  });

  const animStates = diceToRoll.map((d, i) => {
    const face = d.faceByLabel[results[i].label];
    const isD4 = d.sides === 4;
    const waypoints = buildTumbleWaypoints(d.currentQuat, d.sides, (fromQuat) =>
      solveSettleFromQuat(fromQuat, face.normal, face.up, isD4)
    );
    const rollDurationMs = rollFloat(2000, 3000);
    return buildRollAnimState(d, waypoints, rollDurationMs);
  });

  runRollAnimations(animStates, () => {
    diceToRoll.forEach((d, i) => {
      d.value = results[i].value;
      d.settled = true;
      d.rolledLabel = results[i].label;
    });
    onAllSettled();
  });
}

function rollDice(diceToRoll, onSettled) {
  if (rolling || diceToRoll.length === 0) return;
  rolling = true;
  const rollBtn = document.getElementById('roll-btn');
  rollBtn.textContent = 'Rolling\u2026';
  rollBtn.disabled = true;
  refreshPickerDisabled();
  refreshAdvantageButtons();
  setGroupChipsDisabled(true);
  setModifierDisabled(true);
  const modifier = getModifierValue();
  const totalElStart = document.getElementById('roll-total');
  totalElStart.innerHTML = '<span class="total-number is-placeholder">&mdash;</span><span class="total-caption">rolling\u2026</span>';

  animateTumbleAndSettle(diceToRoll, finishRoll);

  function finishRoll() {
    if (onSettled) onSettled();
    rolling = false;
    rollBtn.textContent = 'Roll the tray';
    rollBtn.disabled = false;
    refreshPickerDisabled();
    refreshAdvantageButtons();
    setGroupChipsDisabled(false);
    setModifierDisabled(false);
    scoreAndRecordRoll(modifier);
  }
}

function roll() {
  rollDice(dice);
}

function buildAdvantageGroups() {
  const doubledDice = [];
  const groups = [];
  let pairCounter = 1000000;

  const schemeFor = (role) => (role === advCreamRole ? 'cream' : 'dark');

  dice.forEach((die) => {
    if (die.isPercentileUnit) return;

    die.advRole = 'original';
    die.colorScheme = schemeFor('original');

    if (die.sides === 100) {
      die.unitDie.advRole = 'original';
      die.unitDie.colorScheme = schemeFor('original');

      const dupTens = buildFreshDie(100);
      const dupUnits = buildFreshDie(10, true);
      const newPairId = pairCounter++;
      dupTens.pairId = newPairId;
      dupUnits.pairId = newPairId;
      dupUnits.isPercentileUnit = true;
      dupTens.unitDie = dupUnits;
      dupTens.advRole = 'duplicate';
      dupUnits.advRole = 'duplicate';
      dupTens.colorScheme = schemeFor('duplicate');
      dupUnits.colorScheme = schemeFor('duplicate');

      doubledDice.push(die, die.unitDie, dupTens, dupUnits);
      groups.push({
        kind: 'percentile',
        original: { tens: die, units: die.unitDie },
        duplicate: { tens: dupTens, units: dupUnits },
      });
    } else {
      const duplicate = buildFreshDie(die.sides);
      duplicate.advRole = 'duplicate';
      duplicate.colorScheme = schemeFor('duplicate');
      doubledDice.push(die, duplicate);
      groups.push({ kind: 'single', original: die, duplicate });
    }
  });

  return { doubledDice, groups };
}

function runCollapseAnimation(winners, losers, durationMs, onDone) {
  const COLLAPSE_DURATION_MS = durationMs;
  const startPositions = new Map();
  winners.forEach((d) => startPositions.set(d, { x: d.screenX, y: d.screenY, scale: d.drawScale }));
  losers.forEach((d) => startPositions.set(d, { x: d.screenX, y: d.screenY, scale: d.drawScale }));

  const startTime = performance.now();

  function frame(now) {
    const t = Math.min(1, (now - startTime) / COLLAPSE_DURATION_MS);
    const eased = easeOutSettle(t);

    winners.forEach((d) => {
      const start = startPositions.get(d);
      d.screenX = start.x + (d._collapseFinalX - start.x) * eased;
      d.screenY = start.y + (d._collapseFinalY - start.y) * eased;
      d.drawScale = start.scale + (d._collapseFinalScale - start.scale) * eased;
    });
    losers.forEach((d) => {
      d.drawOpacity = 1 - eased;
    });

    renderDiceCanvas();
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      onDone();
    }
  }
  requestAnimationFrame(frame);
}

function rollAdvantage(keepHigh) {
  if (rolling || dice.length === 0) return;
  rolling = true;
  const rollBtn = document.getElementById('roll-btn');
  const advBtn = document.getElementById('advantage-btn');
  const disadvBtn = document.getElementById('disadvantage-btn');
  rollBtn.disabled = true;
  advBtn.disabled = true;
  disadvBtn.disabled = true;
  refreshPickerDisabled();
  setGroupChipsDisabled(true);
  setModifierDisabled(true);
  const modifier = getModifierValue();
  const totalElStart = document.getElementById('roll-total');
  totalElStart.innerHTML = '<span class="total-number is-placeholder">&mdash;</span><span class="total-caption">rolling\u2026</span>';

  const { doubledDice, groups } = buildAdvantageGroups();
  dice = doubledDice;
  layoutDoubledGrid(groups);
  renderDiceCanvas();

  animateTumbleAndSettle(dice, () => {
    const PAUSE_MS = 650;
    setTimeout(() => {
      const groupValue = (member) => {
        const v = member.tens !== undefined ? percentileValueOf(member.tens, member.units) : member.value;
        return v === null ? 0 : v;
      };

      let originalTotal = 0;
      let duplicateTotal = 0;
      groups.forEach((group) => {
        originalTotal += groupValue(group.original);
        duplicateTotal += groupValue(group.duplicate);
      });

      const originalWins = keepHigh ? originalTotal >= duplicateTotal : originalTotal <= duplicateTotal;
      const winningRole = originalWins ? 'original' : 'duplicate';

      const winners = [];
      const losers = [];
      groups.forEach((group) => {
        const winnerMember = originalWins ? group.original : group.duplicate;
        const loserMember = originalWins ? group.duplicate : group.original;
        if (group.kind === 'percentile') {
          winners.push(winnerMember.tens, winnerMember.units);
          losers.push(loserMember.tens, loserMember.units);
        } else {
          winners.push(winnerMember);
          losers.push(loserMember);
        }
      });

      advCreamRole = winningRole;

      const COLLAPSE_MS = 420;
      runCollapseAnimation(winners, losers, COLLAPSE_MS, () => {
        dice = winners;
        layoutDiceGrid();
        renderDiceCanvas();

        rolling = false;
        rollBtn.disabled = false;
        advBtn.disabled = false;
        disadvBtn.disabled = false;
        refreshPickerDisabled();
        refreshAdvantageButtons();
        setGroupChipsDisabled(false);
        setModifierDisabled(false);

        scoreAndRecordRoll(modifier);
      });
    }, PAUSE_MS);
  });
}

function percentileValueOf(tensDie, unitsDie) {
  if (unitsDie.value === null) return null;
  const combined = tensDie.value + unitsDie.value;
  return combined === 0 ? 100 : combined;
}

function scoreAndRecordRoll(modifier) {
  const rolledDice = dice.filter((d) => !d.isPercentileUnit && d.value !== null);
  const valueOf = (d) => (d.sides === 100 ? percentileValueOf(d, d.unitDie) : d.value);
  const scored = rolledDice.filter((d) => valueOf(d) !== null);

  const bySides = {};
  scored.forEach((d) => {
    bySides[d.sides] = bySides[d.sides] || [];
    bySides[d.sides].push(valueOf(d));
  });
  const diceTotal = scored.reduce((sum, d) => sum + valueOf(d), 0);
  const total = diceTotal + modifier;
  const summary = DIE_TYPES.filter((s) => bySides[s]).map((s) => `d${s}: ${bySides[s].join(', ')}`).join('   ');

  history.unshift({ summary, total, n: scored.length, modifier });
  history = history.slice(0, 6);
  renderHistory();

  const captionExtra = modifier !== 0 ? ` (${diceTotal} ${formatModifier(modifier)})` : '';
  const totalEl = document.getElementById('roll-total');
  totalEl.innerHTML = `<span class="total-number">${total}</span><span class="total-caption">total across ${scored.length} ${scored.length === 1 ? 'die' : 'dice'}${captionExtra}</span>`;
}

function rerollDie(die) {
  if (die.pairId !== undefined) {
    const owner = die.isPercentileUnit
      ? dice.find((d) => d.pairId === die.pairId && !d.isPercentileUnit)
      : die;
    rollDice([owner, owner.unitDie]);
    return;
  }
  rollDice([die]);
}

function renderHistory() {
  const wrap = document.getElementById('history');
  const rows = document.getElementById('history-rows');
  if (history.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  rows.innerHTML = '';
  history.forEach((h) => {
    const row = document.createElement('div');
    row.className = 'history-row';
    const modPart = h.modifier ? `   mod ${formatModifier(h.modifier)}` : '';
    row.innerHTML = `<span class="h-summary">${h.summary}${modPart}</span><span class="h-total">= ${h.total}</span>`;
    rows.appendChild(row);
  });
}

document.getElementById('roll-btn').onclick = roll;
document.getElementById('advantage-btn').onclick = () => rollAdvantage(true);
document.getElementById('disadvantage-btn').onclick = () => rollAdvantage(false);

/* =========================================================================
   MODIFIER INPUT
   ========================================================================= */
const modifierInput = document.getElementById('modifier-input');

function sanitizeModifierText(raw) {
  let s = raw.replace(/[^0-9-]/g, '');
  const negative = s.startsWith('-');
  s = s.replace(/-/g, '');
  const core = (negative ? '-' : '') + s;
  if (!negative && s !== '' && /[1-9]/.test(s)) return '+' + s;
  if (core === '') return '+';
  return core;
}

modifierInput.addEventListener('input', () => {
  const sanitized = sanitizeModifierText(modifierInput.value);
  if (sanitized !== modifierInput.value) modifierInput.value = sanitized;
  updateModifierSignBtn();
});

const modifierSignBtn = document.getElementById('modifier-sign-btn');

modifierSignBtn.addEventListener('click', () => {
  const current = getModifierValue();
  if (current !== 0) {
    modifierInput.value = sanitizeModifierText(String(-current));
  } else {
    modifierInput.value = modifierInput.value === '-' ? '+' : '-';
  }
  updateModifierSignBtn();
  modifierInput.focus();
});

function updateModifierSignBtn() {
  const value = modifierInput.value.trim();
  modifierSignBtn.classList.toggle('is-negative', value.startsWith('-'));
  modifierSignBtn.classList.toggle('is-positive', value.startsWith('+'));
}
updateModifierSignBtn();

function setModifierDisabled(disabled) {
  modifierInput.disabled = disabled;
  modifierSignBtn.disabled = disabled;
}

function getModifierValue() {
  const raw = modifierInput.value;
  if (raw === '' || raw === '-' || raw === '+') return 0;
  const n = parseInt(raw, 10);
  return Number.isFinite(n) ? n : 0;
}

function formatModifier(n) {
  return n > 0 ? `+${n}` : String(n);
}

let resizeRaf = null;
window.addEventListener('resize', () => {
  if (resizeRaf) return;
  resizeRaf = requestAnimationFrame(() => {
    resizeRaf = null;
    layoutDiceGrid();
    renderDiceCanvas();
  });
});

/* =========================================================================
   TAP/CLICK TO REROLL A SINGLE DIE
   ========================================================================= */
const DIE_HIT_RADIUS = 52;
const DIE_HIT_RADIUS_PERCENTILE = 34;

document.getElementById('dice-canvas').addEventListener('mousemove', (e) => {
  if (rolling) { e.currentTarget.style.cursor = 'default'; return; }
  const rect = e.currentTarget.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const overDie = dice.some((die) => {
    const radius = die.pairId !== undefined ? DIE_HIT_RADIUS_PERCENTILE : DIE_HIT_RADIUS;
    const dx = die.screenX - x, dy = die.screenY - y;
    return dx * dx + dy * dy <= radius * radius;
  });
  e.currentTarget.style.cursor = overDie ? 'pointer' : 'default';
});

document.getElementById('dice-canvas').addEventListener('mouseleave', (e) => {
  e.currentTarget.style.cursor = 'default';
});

document.getElementById('dice-canvas').addEventListener('click', (e) => {
  if (rolling) return;
  const canvas = document.getElementById('dice-canvas');
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  let closestDie = null;
  let closestDistSq = DIE_HIT_RADIUS * DIE_HIT_RADIUS;
  dice.forEach((die) => {
    const radius = die.pairId !== undefined ? DIE_HIT_RADIUS_PERCENTILE : DIE_HIT_RADIUS;
    const dx = die.screenX - x, dy = die.screenY - y;
    const distSq = dx * dx + dy * dy;
    if (distSq <= radius * radius && distSq <= closestDistSq) {
      closestDistSq = distSq;
      closestDie = die;
    }
  });

  if (closestDie) rerollDie(closestDie);
});

/* =========================================================================
   TRAY THEMES
   Each theme defines CSS custom property overrides applied to :root.
   Keys map directly to CSS variable names (without --).
   ========================================================================= */
/* =========================================================================
   TEXTURE GENERATORS
   Each returns a data URL of a transparent-background PNG that overlays
   on top of the solid --tray-bg colour set in each theme.
   ========================================================================= */

function makeCanvas(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return c;
}

function hexToRgb(hex) {
  const h = hex.replace('#','');
  const n = parseInt(h,16);
  return [(n>>16)&255,(n>>8)&255,n&255];
}

// Felt: fine crossed fibres — transparent overlay on base colour
// Felt — pixel-level random fibre fuzz, no grid. Each pixel gets a brightness
// based on overlapping short random fibres sampled by position, giving a soft
// nap look without any warp/weft structure.
function genFeltTexture(lightHex, w=512, h=512) {
  const c = makeCanvas(w, h);
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(w, h);
  const [lr,lg,lb] = hexToRgb(lightHex);

  function hash(x, y) { let n = Math.sin(x*127.1 + y*311.7)*43758.5453; return n - Math.floor(n); }
  function hash3(x, y, z) { let n = Math.sin(x*127.1 + y*311.7 + z*74.3)*43758.5453; return n - Math.floor(n); }
  function valueNoise(x, y) {
    const ix=Math.floor(x), iy=Math.floor(y), fx=x-ix, fy=y-iy;
    const ux=fx*fx*(3-2*fx), uy=fy*fy*(3-2*fy);
    return hash(ix,iy)*(1-ux)*(1-uy)+hash(ix+1,iy)*ux*(1-uy)+hash(ix,iy+1)*(1-ux)*uy+hash(ix+1,iy+1)*ux*uy;
  }
  function fbm(x, y, oct) {
    let v=0,a=1,f=1,t=0;
    for(let i=0;i<oct;i++){v+=valueNoise(x*f,y*f)*a;t+=a;a*=0.5;f*=2.1;}
    return v/t;
  }

  // Scatter a large number of short fibres; for each output pixel, accumulate
  // how many fibres pass near it to get a fuzzy density value.
  // Rather than testing all fibres per pixel (slow), we use noise fields
  // to simulate fibre density and local nap direction continuously.

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      // Local fibre density — smoothly varying fuzz thickness
      const density = fbm(x*0.06, y*0.06, 4);

      // Very fine high-freq noise simulates individual fibre cross-sections
      const fibre1 = fbm(x*0.8,  y*0.8,  3);
      const fibre2 = fbm(x*0.8+31.7, y*0.8+17.3, 3);
      const fibre3 = fbm(x*0.8+53.1, y*0.8+42.9, 3);

      // Each fibre layer has a slight directional bias (different angles)
      // achieved by sampling noise at a rotated coordinate
      const angle1 = Math.PI * 0.15; // ~27°
      const angle2 = Math.PI * 0.55; // ~99°
      const angle3 = Math.PI * 0.82; // ~148°
      const rx1 = x*Math.cos(angle1) + y*Math.sin(angle1);
      const ry1 =-x*Math.sin(angle1) + y*Math.cos(angle1);
      const rx2 = x*Math.cos(angle2) + y*Math.sin(angle2);
      const ry2 =-x*Math.sin(angle2) + y*Math.cos(angle2);
      const rx3 = x*Math.cos(angle3) + y*Math.sin(angle3);
      const ry3 =-x*Math.sin(angle3) + y*Math.cos(angle3);
      const dir1 = fbm(rx1*0.5, ry1*0.12, 3); // anisotropic — stretched along fibre
      const dir2 = fbm(rx2*0.5, ry2*0.12, 3);
      const dir3 = fbm(rx3*0.5, ry3*0.12, 3);

      // Combine three direction layers — each contributes independently
      const fuzz = (dir1*0.4 + dir2*0.35 + dir3*0.25) * density;

      // Fine surface sheen — specular-like bright flecks from fibre tips
      const sheen = Math.pow(fbm(x*1.8, y*1.8, 2), 6) * 0.5;

      // Large-scale light/dark pile compression zones (like running a hand across velvet)
      const zone = fbm(x*0.008, y*0.008, 3) * 0.25 + 0.85;

      const bright = (fuzz * 0.75 + sheen) * zone;

      // Output: mostly transparent, light fibres = slight brightening, dark gaps = slight darkening
      const aboveMid = bright - 0.5;
      let r, g, b, alpha;
      if (aboveMid > 0) {
        // Bright fibre tip — white tinted slightly with sheen colour
        r = Math.round(lr + (255-lr)*aboveMid*0.35);
        g = Math.round(lg + (255-lg)*aboveMid*0.35);
        b = Math.round(lb + (255-lb)*aboveMid*0.35);
        alpha = Math.round(aboveMid * 200);
      } else {
        // Dark fibre gap / shadow
        r = 0; g = 0; b = 0;
        alpha = Math.round(-aboveMid * 120);
      }

      const i = (y*w+x)*4;
      img.data[i]   = Math.min(255, Math.max(0, r));
      img.data[i+1] = Math.min(255, Math.max(0, g));
      img.data[i+2] = Math.min(255, Math.max(0, b));
      img.data[i+3] = Math.min(255, Math.max(0, alpha));
    }
  }
  ctx.putImageData(img, 0, 0);
  return c.toDataURL();
}

// Wood grain — transparent overlay, grain lines only
function genWoodTexture(darkHex, lightHex, w=512, h=256) {
  const c = makeCanvas(w, h);
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,w,h);
  const [dr,dg,db] = hexToRgb(darkHex);
  const [lr,lg,lb] = hexToRgb(lightHex);
  for (let y = 0; y < h; y++) {
    const wave = Math.sin(y*0.18)*12 + Math.sin(y*0.07+1.3)*8 + Math.sin(y*0.41+2.7)*3;
    const ring = (y + wave) % 14;
    const ringT = ring / 14;
    const fade = ringT < 0.5 ? ringT*2 : (1-ringT)*2;
    const a = fade * 0.28;
    const isDark = Math.floor((y+wave)/14) % 2 === 0;
    ctx.strokeStyle = isDark
      ? `rgba(${dr},${dg},${db},${a})`
      : `rgba(${lr},${lg},${lb},${a})`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
  }
  // Pore whiskers
  for (let i = 0; i < 250; i++) {
    const x = Math.random()*w, y = Math.random()*h;
    const len = 2 + Math.random()*8;
    ctx.strokeStyle = `rgba(0,0,0,${0.04 + Math.random()*0.08})`;
    ctx.lineWidth = 0.5 + Math.random()*0.5;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+(Math.random()-0.5)*2, y+len); ctx.stroke();
  }
  return c.toDataURL();
}

// Marble — pixel-level vein marbling, transparent background
function genMarbleTexture(vein1Hex, vein2Hex, w=512, h=512) {
  const c = makeCanvas(w, h);
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(w, h);
  const [v1r,v1g,v1b] = hexToRgb(vein1Hex);
  const [v2r,v2g,v2b] = hexToRgb(vein2Hex);

  function fbm(x, y) {
    let v = 0, amp = 1, freq = 1;
    for (let i = 0; i < 5; i++) {
      v += Math.sin((x*freq*0.012 + y*freq*0.008) + amp) * amp;
      v += Math.cos((y*freq*0.014 - x*freq*0.006) + amp*1.3) * amp * 0.5;
      amp *= 0.55; freq *= 2.1;
    }
    return v;
  }

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const n = fbm(x, y);
      const m = Math.abs(Math.sin(x*0.025 + y*0.01 + n));
      const v = Math.abs(Math.sin(x*0.008 - y*0.02 + n*1.5));
      const t1 = Math.pow(Math.max(0, 1 - m*3.5), 2);
      const t2 = Math.pow(Math.max(0, 1 - v*5), 3);
      // Alpha: only paint where veins are — rest stays transparent
      const alpha = Math.min(255, Math.round((t1*0.7 + t2*0.5) * 255));
      const r = Math.round(v1r*t1 + v2r*t2);
      const g = Math.round(v1g*t1 + v2g*t2);
      const b = Math.round(v1b*t1 + v2b*t2);
      const i = (y*w+x)*4;
      img.data[i]   = Math.min(255,Math.max(0,r));
      img.data[i+1] = Math.min(255,Math.max(0,g));
      img.data[i+2] = Math.min(255,Math.max(0,b));
      img.data[i+3] = alpha;
    }
  }
  ctx.putImageData(img, 0, 0);
  return c.toDataURL();
}

// Velvet — pixel-level anisotropic microfibre with sheen falloff
// Models how velvet pile catches light: dark in one direction, bright in another.
function genVelvetTexture(sheenHex, w=512, h=512) {
  const c = makeCanvas(w, h);
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(w, h);
  const [sr,sg,sb] = hexToRgb(sheenHex);

  // Noise helper — value noise via hash
  function hash(x, y) {
    let n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
    return n - Math.floor(n);
  }
  function valueNoise(x, y) {
    const ix = Math.floor(x), iy = Math.floor(y);
    const fx = x - ix, fy = y - iy;
    const ux = fx*fx*(3-2*fx), uy = fy*fy*(3-2*fy);
    return hash(ix,iy)*(1-ux)*(1-uy) + hash(ix+1,iy)*ux*(1-uy)
         + hash(ix,iy+1)*(1-ux)*uy   + hash(ix+1,iy+1)*ux*uy;
  }
  function fbmNoise(x, y, oct) {
    let v=0, a=1, f=1, t=0;
    for(let i=0;i<oct;i++){v+=valueNoise(x*f,y*f)*a;t+=a;a*=0.5;f*=2.1;}
    return v/t;
  }

  // Nap direction field — smoothly varying across surface with gentle curl
  // This simulates how velvet pile is brushed in slightly different directions
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      // Local nap angle — varies with low-frequency noise
      const napAngle = (fbmNoise(x*0.008, y*0.008, 3) - 0.5) * Math.PI * 0.6
                     + Math.PI * 0.25; // base 45° diagonal nap
      const napDx = Math.cos(napAngle);
      const napDy = Math.sin(napAngle);

      // Light direction (from upper-left)
      const lx = 0.577, ly = -0.577, lz = 0.577;

      // Microfibre normal perturbation from high-frequency noise
      const grain = fbmNoise(x*0.4, y*0.4, 4);
      const fibreWiggle = (grain - 0.5) * 0.3;

      // Anisotropic highlight: bright when view aligns perpendicular to nap
      const perpAngle = napAngle + Math.PI * 0.5 + fibreWiggle;
      const perpDx = Math.cos(perpAngle);
      const perpDy = Math.sin(perpAngle);

      // Schlick-like sheen: bright at grazing, dark along nap
      const dotL = lx * perpDx + ly * perpDy;
      const sheen = Math.pow(Math.max(0, dotL * 0.5 + 0.5), 2.5);

      // Depth shadow: fibres self-shadow creating dark micro-valleys
      const shadow = fbmNoise(x*0.25 + napDx*0.5, y*0.25 + napDy*0.5, 3);
      const selfShadow = Math.pow(shadow, 0.7) * 0.5 + 0.5;

      // Broad velvet zones — lighter/darker regions from pile compression
      const zone = fbmNoise(x*0.004, y*0.004, 2);
      const zoneBright = zone * 0.4 + 0.8; // 0.8 – 1.2

      // Combine
      const brightness = sheen * 0.7 + selfShadow * 0.3;
      const finalBright = brightness * zoneBright;

      const alpha = Math.min(255, Math.round(finalBright * 180));
      const ir = Math.min(255, Math.round(sr * finalBright * 1.2));
      const ig = Math.min(255, Math.round(sg * finalBright * 1.2));
      const ib = Math.min(255, Math.round(sb * finalBright * 1.2));

      const idx = (y * w + x) * 4;
      img.data[idx]   = ir;
      img.data[idx+1] = ig;
      img.data[idx+2] = ib;
      img.data[idx+3] = alpha;
    }
  }
  ctx.putImageData(img, 0, 0);
  return c.toDataURL();
}

// Slate — full pixel-level geology: cleavage planes, crystal grain, specular glints
// Slate — diagonal shear planes with bright mineral veins, matching real slate.
// No Voronoi dots or horizontal cracks. The key features from the photo are:
// long diagonal bands (upper-left to lower-right), lighter mineral intrusion
// veins running along those bands, and fine surface grain throughout.
function genSlateTexture(midHex, lightHex, w=512, h=512) {
  const c = makeCanvas(w, h);
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(w, h);
  const [mr,mg,mb] = hexToRgb(midHex);
  const [lr,lg,lb] = hexToRgb(lightHex);

  function hash(x, y) { let n=Math.sin(x*127.1+y*311.7)*43758.5453; return n-Math.floor(n); }
  function valueNoise(x, y) {
    const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;
    const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);
    return hash(ix,iy)*(1-ux)*(1-uy)+hash(ix+1,iy)*ux*(1-uy)+hash(ix,iy+1)*(1-ux)*uy+hash(ix+1,iy+1)*ux*uy;
  }
  function fbm(x, y, oct) {
    let v=0,a=1,f=1,t=0;
    for(let i=0;i<oct;i++){v+=valueNoise(x*f,y*f)*a;t+=a;a*=0.55;f*=2.0;}
    return v/t;
  }

  // Slate shear angle — roughly 135° (upper-left to lower-right diagonal)
  // We work in a rotated coordinate space aligned to the shear direction
  const shearAngle = Math.PI * 0.72; // ~130°
  const cos_a = Math.cos(shearAngle), sin_a = Math.sin(shearAngle);

  // Raking light from upper-left, almost grazing — maximises texture contrast
  const lx = 0.5, ly = -0.7, lz = 0.51;

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      // Rotate into shear-plane space
      const su =  x * cos_a + y * sin_a;  // along shear planes
      const sv = -x * sin_a + y * cos_a;  // across shear planes

      // Primary shear banding — low frequency across the planes (sv direction)
      // Multiple overlapping bands at slightly different frequencies give realism
      const warp = fbm(su*0.003, sv*0.003, 3) * 60; // domain warp to make bands wavy
      const band1 = fbm((sv + warp) * 0.012, su*0.002, 5);
      const band2 = fbm((sv + warp*0.6) * 0.007 + 10.3, su*0.001 + 5.1, 4);
      const bandVal = band1 * 0.6 + band2 * 0.4;

      // Fine surface grain — high frequency, isotropic
      const grain = fbm(x*0.22, y*0.22, 4);

      // Mineral veins — bright thin lines running along the shear direction
      // These are the white/light lines visible in real slate
      // Model as sharp peaks in a warped sine field
      const veinWarp = fbm(su*0.008 + 2.1, sv*0.008, 3) * 40;
      const veinPhase = (sv + veinWarp) * 0.028;
      // Multiple vein frequencies — some are wider mineral intrusions
      const vein1 = Math.pow(Math.max(0, Math.sin(veinPhase * 1.0 + 0.3)), 8);
      const vein2 = Math.pow(Math.max(0, Math.sin(veinPhase * 2.3 + 1.7)), 12);
      const vein3 = Math.pow(Math.max(0, Math.sin(veinPhase * 0.5 + 4.1)), 6) * 0.5;
      const veinTotal = vein1 * 0.5 + vein2 * 0.35 + vein3 * 0.15;
      // Modulate vein brightness by position along shear (veins aren't uniform)
      const veinMod = fbm(su*0.006, sv*0.002+20, 3) * 0.7 + 0.3;
      const vein = veinTotal * veinMod;

      // Surface normal from banding + grain for lighting
      const eps = 1.5;
      const bx = fbm((sv+warp+eps)*0.012, su*0.002, 4) - fbm((sv+warp-eps)*0.012, su*0.002, 4);
      const by = fbm((sv+warp)*0.012, (su+eps)*0.002, 4) - fbm((sv+warp)*0.012, (su-eps)*0.002, 4);
      const nlen = Math.sqrt(bx*bx + by*by + 0.08);
      const nx = -bx/nlen * 1.5, ny = by/nlen * 1.5, nz = 0.28/nlen;

      // Diffuse lighting
      const diffuse = Math.max(0.15, nx*lx + ny*ly + nz*lz);
      // Sharp specular for wet/polished slate look
      const spec = Math.pow(Math.max(0, diffuse), 22) * 0.4;

      // Dark zones — slightly recessed areas between shear planes
      const shadow = Math.pow(1 - bandVal, 2.5) * 0.35;

      // Combine: base colour varies between mid and light by banding
      const t = bandVal * 0.6 + grain * 0.25 + vein * 0.15;
      const baseR = mr + (lr-mr) * t;
      const baseG = mg + (lg-mg) * t;
      const baseB = mb + (lb-mb) * t;

      const lit = diffuse * (1 - shadow);

      // Vein colour: bright near-white with slight warm tint
      const veinR = Math.round(Math.min(255, baseR*(1-vein*0.7) + 230*vein*0.7 + spec*180));
      const veinG = Math.round(Math.min(255, baseG*(1-vein*0.7) + 228*vein*0.7 + spec*185));
      const veinB = Math.round(Math.min(255, baseB*(1-vein*0.7) + 235*vein*0.7 + spec*200));

      const ir = Math.min(255, Math.max(0, Math.round(veinR * lit)));
      const ig = Math.min(255, Math.max(0, Math.round(veinG * lit)));
      const ib = Math.min(255, Math.max(0, Math.round(veinB * lit)));
      const alpha = Math.min(255, Math.round((t * 0.7 + vein * 0.5 + grain * 0.2) * 255));

      const i = (y*w+x)*4;
      img.data[i]   = ir;
      img.data[i+1] = ig;
      img.data[i+2] = ib;
      img.data[i+3] = alpha;
    }
  }
  ctx.putImageData(img, 0, 0);
  return c.toDataURL();
}

// Parchment — smooth aged paper: directional fibre flow, subtle tone variation,
// light edge darkening. No spots or foxing — just the feel of old vellum.
function genParchmentTexture(darkHex, w=512, h=512) {
  const c = makeCanvas(w, h);
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(w, h);
  const [dr,dg,db] = hexToRgb(darkHex);

  function hash(x, y) { let n=Math.sin(x*127.1+y*311.7)*43758.5453; return n-Math.floor(n); }
  function valueNoise(x, y) {
    const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;
    const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);
    return hash(ix,iy)*(1-ux)*(1-uy)+hash(ix+1,iy)*ux*(1-uy)+hash(ix,iy+1)*(1-ux)*uy+hash(ix+1,iy+1)*ux*uy;
  }
  function fbm(x, y, oct) {
    let v=0,a=1,f=1,t=0;
    for(let i=0;i<oct;i++){v+=valueNoise(x*f,y*f)*a;t+=a;a*=0.5;f*=2.1;}
    return v/t;
  }

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      // Broad tonal variation — the warm/cool patches of aged vellum
      const tone = fbm(x*0.005, y*0.005, 3);

      // Paper fibre direction — horizontal with gentle undulation
      const flowWarp = fbm(x*0.015, y*0.015, 3) * 30;
      const fibreU = x * 0.7 + flowWarp;
      const fibreV = y * 0.08;
      // Anisotropic fibre noise: much lower frequency in flow direction
      const fibre = fbm(fibreU * 0.04, fibreV * 0.4, 4);

      // Fine surface tooth — the micro-roughness of laid paper
      const tooth = fbm(x*0.45, y*0.45, 3) * 0.15;

      // Combine into brightness variation
      const surface = tone * 0.5 + fibre * 0.35 + tooth;

      // Edge vignette — computed per-pixel, smooth
      const ex = (x / w - 0.5) * 2;
      const ey = (y / h - 0.5) * 2;
      const edgeDist = Math.max(0, ex*ex + ey*ey - 0.2);
      const vignette = edgeDist * 0.35;

      const bright = surface - vignette;

      // Slightly darken/warm towards the dark ink colour in shadows
      const alpha = Math.min(255, Math.round(Math.abs(bright - 0.5) * 180));
      const sign = bright > 0.5 ? 1 : -1;
      const r = sign > 0 ? 255 : dr;
      const g = sign > 0 ? 245 : dg;
      const b = sign > 0 ? 220 : db;

      const i = (y*w+x)*4;
      img.data[i]   = r;
      img.data[i+1] = g;
      img.data[i+2] = b;
      img.data[i+3] = alpha;
    }
  }
  ctx.putImageData(img, 0, 0);
  return c.toDataURL();
}

// Ocean — domain-warped caustic light patterns. The key is using fBm to warp
// the domain before evaluating the caustic sines, breaking any geometric regularity.
function genOceanTexture(causticHex, w=512, h=512) {
  const c = makeCanvas(w, h);
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(w, h);
  const [cr,cg,cb] = hexToRgb(causticHex);

  function hash(x, y) { let n=Math.sin(x*127.1+y*311.7)*43758.5453; return n-Math.floor(n); }
  function valueNoise(x, y) {
    const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;
    const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);
    return hash(ix,iy)*(1-ux)*(1-uy)+hash(ix+1,iy)*ux*(1-uy)+hash(ix,iy+1)*(1-ux)*uy+hash(ix+1,iy+1)*ux*uy;
  }
  function fbm(x, y, oct) {
    let v=0,a=1,f=1,t=0;
    for(let i=0;i<oct;i++){v+=valueNoise(x*f,y*f)*a;t+=a;a*=0.5;f*=2.1;}
    return v/t;
  }

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      // Two-pass domain warp — warp the warp — gives fully organic, non-repeating patterns
      // First warp
      const wx1 = fbm(x*0.008,       y*0.008,       4) * 45;
      const wy1 = fbm(x*0.008 + 3.7, y*0.008 + 5.2, 4) * 45;
      // Second warp using already-warped coordinates
      const wx2 = fbm((x+wx1)*0.006,       (y+wy1)*0.006,       3) * 35;
      const wy2 = fbm((x+wx1)*0.006 + 8.1, (y+wy1)*0.006 + 2.4, 3) * 35;

      const wx = x + wx1 + wx2;
      const wy = y + wy1 + wy2;

      // Caustic pattern evaluated in warped space — multiple frequencies
      // Multiply rather than add for sharp bright focal spots like real caustics
      const c1 = Math.sin(wx * 0.032 + wy * 0.024) * 0.5 + 0.5;
      const c2 = Math.sin(wx * 0.051 - wy * 0.038 + 2.1) * 0.5 + 0.5;
      const c3 = Math.sin(-wx * 0.027 + wy * 0.059 + 4.6) * 0.5 + 0.5;
      const c4 = Math.sin(wx * 0.019 + wy * 0.071 + 1.3) * 0.5 + 0.5;

      // Caustic: product of waves gives sparse, bright focal points
      const caustic = Math.pow(c1 * c2 * c3 * c4, 0.55);

      // Depth variation — large-scale dark/light patches like depth variation
      const depth = fbm(x*0.004, y*0.006, 3) * 0.35 + 0.65;

      // Subsurface scatter — blue-green glow in brightest caustic zones
      const scatter = Math.pow(Math.max(0, caustic - 0.6), 2) * 4.0;

      // Specular surface sparkle — tiny, very bright
      const sparkSeed = hash(Math.floor(x*0.8)*1.3 + 0.7, Math.floor(y*0.8)*1.7 + 0.3);
      const spark = sparkSeed > 0.994 ? (sparkSeed - 0.994) / 0.006 * 2.0 : 0;

      const totalBright = caustic * depth + scatter * 0.5 + spark * 0.6;

      // Caustic colour: cyan-white in bright spots, pure colour in mid, transparent in dark
      const rr = Math.min(255, Math.round((cr * caustic * 0.8 + 220 * scatter * 0.15 + 255 * spark * 0.4) * depth));
      const rg = Math.min(255, Math.round((cg * caustic * 0.8 + 240 * scatter * 0.35 + 255 * spark * 0.6) * depth));
      const rb = Math.min(255, Math.round((cb * caustic * 0.8 + 255 * scatter * 0.55 + 255 * spark) * depth));
      const alpha = Math.min(255, Math.round(totalBright * 210));

      const i = (y*w+x)*4;
      img.data[i]   = rr;
      img.data[i+1] = rg;
      img.data[i+2] = rb;
      img.data[i+3] = alpha;
    }
  }
  ctx.putImageData(img, 0, 0);
  return c.toDataURL();
}

// Forge — cracked rock with glowing fissures, transparent overlay
function genForgeTexture(glowHex, w=512, h=512) {
  const c = makeCanvas(w, h);
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,w,h);
  const [gr,gg,gb] = hexToRgb(glowHex);
  for (let i = 0; i < 40; i++) {
    const sx = Math.random()*w, sy = Math.random()*h;
    const a = 0.35 + Math.random()*0.5;
    ctx.strokeStyle = `rgba(${gr},${gg},${gb},${a})`;
    ctx.lineWidth = 0.5 + Math.random()*1.5;
    ctx.shadowColor = `rgba(${gr},${gg},${gb},0.9)`;
    ctx.shadowBlur = 5 + Math.random()*7;
    ctx.beginPath(); ctx.moveTo(sx, sy);
    let cx2=sx, cy2=sy;
    for (let s=0; s<4; s++) {
      cx2 += (Math.random()-0.5)*80; cy2 += (Math.random()-0.5)*80;
      ctx.lineTo(cx2, cy2);
    }
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
  // Dark rock grain
  for (let i = 0; i < 800; i++) {
    const px = Math.random()*w, py = Math.random()*h;
    ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.08})`;
    ctx.fillRect(px,py,1+Math.random()*2,1);
  }
  return c.toDataURL();
}

/* =========================================================================
   BACKGROUND CANVAS GENERATORS
   Coarser / wider-scale versions of each tray texture, painted onto a
   fixed full-page canvas so the tray reads as inset into the surface.
   Same material as the tray but: larger scale, less contrast, slightly
   different angle/pattern so they're clearly distinct.
   ========================================================================= */

// Bg felt — same pixel fuzz approach as tray but lower frequency (larger-scale nap zones)
function genBgFelt(col1Hex, col2Hex, w, h) {
  const c = makeCanvas(w, h);
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(w, h);
  const [lr,lg,lb] = hexToRgb(col1Hex);
  function hash(x,y){let n=Math.sin(x*127.1+y*311.7)*43758.5453;return n-Math.floor(n);}
  function vn(x,y){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy,ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);return hash(ix,iy)*(1-ux)*(1-uy)+hash(ix+1,iy)*ux*(1-uy)+hash(ix,iy+1)*(1-ux)*uy+hash(ix+1,iy+1)*ux*uy;}
  function fbm(x,y,o){let v=0,a=1,f=1,t=0;for(let i=0;i<o;i++){v+=vn(x*f,y*f)*a;t+=a;a*=0.5;f*=2.1;}return v/t;}
  for(let y=0;y<h;y++){for(let x=0;x<w;x++){
    // Half the spatial frequency of tray — coarser nap zones
    const density=fbm(x*0.03,y*0.03,4);
    const a1=Math.PI*0.15, a2=Math.PI*0.55, a3=Math.PI*0.82;
    const rx1=x*Math.cos(a1)+y*Math.sin(a1), ry1=-x*Math.sin(a1)+y*Math.cos(a1);
    const rx2=x*Math.cos(a2)+y*Math.sin(a2), ry2=-x*Math.sin(a2)+y*Math.cos(a2);
    const rx3=x*Math.cos(a3)+y*Math.sin(a3), ry3=-x*Math.sin(a3)+y*Math.cos(a3);
    const d1=fbm(rx1*0.25,ry1*0.06,3);
    const d2=fbm(rx2*0.25,ry2*0.06,3);
    const d3=fbm(rx3*0.25,ry3*0.06,3);
    const fuzz=(d1*0.4+d2*0.35+d3*0.25)*density;
    const sheen=Math.pow(fbm(x*0.9,y*0.9,2),6)*0.4;
    const zone=fbm(x*0.004,y*0.004,3)*0.25+0.85;
    const bright=(fuzz*0.75+sheen)*zone;
    const aboveMid=bright-0.5;
    let r,g,b,alpha;
    if(aboveMid>0){r=Math.round(lr+(255-lr)*aboveMid*0.35);g=Math.round(lg+(255-lg)*aboveMid*0.35);b=Math.round(lb+(255-lb)*aboveMid*0.35);alpha=Math.round(aboveMid*180);}
    else{r=0;g=0;b=0;alpha=Math.round(-aboveMid*100);}
    const i=(y*w+x)*4;
    img.data[i]=Math.min(255,Math.max(0,r));img.data[i+1]=Math.min(255,Math.max(0,g));img.data[i+2]=Math.min(255,Math.max(0,b));img.data[i+3]=Math.min(255,Math.max(0,alpha));
  }}
  ctx.putImageData(img,0,0);
  return c;
}

// Coarse wood — wider rings, more dramatic grain variation
function genBgWood(darkHex, lightHex, w, h) {
  const c = makeCanvas(w, h);
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, w, h);
  const [dr, dg, db] = hexToRgb(darkHex);
  const [lr, lg, lb] = hexToRgb(lightHex);
  // Wider rings (spacing 22 vs 14 on tray), more turbulent
  for (let y = 0; y < h; y++) {
    const wave = Math.sin(y * 0.09) * 20 + Math.sin(y * 0.04 + 0.8) * 14 + Math.sin(y * 0.22 + 2.1) * 6;
    const ring = (y + wave) % 22;
    const ringT = ring / 22;
    const fade = ringT < 0.5 ? ringT * 2 : (1 - ringT) * 2;
    const isDark = Math.floor((y + wave) / 22) % 2 === 0;
    const a = fade * 0.18;
    ctx.strokeStyle = isDark
      ? `rgba(${dr},${dg},${db},${a})`
      : `rgba(${lr},${lg},${lb},${a})`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }
  // Sparser pores
  for (let i = 0; i < 150; i++) {
    const x = Math.random() * w, y = Math.random() * h;
    ctx.strokeStyle = `rgba(0,0,0,${0.03 + Math.random() * 0.06})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + (Math.random() - 0.5) * 2, y + 4 + Math.random() * 10);
    ctx.stroke();
  }
  return c;
}

// Coarse marble — larger-scale veins, lower frequency
function genBgMarble(vein1Hex, vein2Hex, w, h) {
  const c = makeCanvas(w, h);
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(w, h);
  const [v1r, v1g, v1b] = hexToRgb(vein1Hex);
  const [v2r, v2g, v2b] = hexToRgb(vein2Hex);
  // Lower frequency fbm than tray (0.006 vs 0.012)
  function fbmBg(x, y) {
    let v = 0, amp = 1, freq = 1;
    for (let i = 0; i < 4; i++) {
      v += Math.sin((x * freq * 0.006 + y * freq * 0.004) + amp) * amp;
      v += Math.cos((y * freq * 0.007 - x * freq * 0.003) + amp * 1.3) * amp * 0.5;
      amp *= 0.6; freq *= 2.0;
    }
    return v;
  }
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const n = fbmBg(x, y);
      const m = Math.abs(Math.sin(x * 0.012 + y * 0.005 + n));
      const v = Math.abs(Math.sin(x * 0.004 - y * 0.01 + n * 1.5));
      const t1 = Math.pow(Math.max(0, 1 - m * 3.5), 2);
      const t2 = Math.pow(Math.max(0, 1 - v * 5), 3);
      const alpha = Math.min(200, Math.round((t1 * 0.65 + t2 * 0.45) * 255));
      const i = (y * w + x) * 4;
      img.data[i]     = Math.min(255, Math.max(0, Math.round(v1r * t1 + v2r * t2)));
      img.data[i + 1] = Math.min(255, Math.max(0, Math.round(v1g * t1 + v2g * t2)));
      img.data[i + 2] = Math.min(255, Math.max(0, Math.round(v1b * t1 + v2b * t2)));
      img.data[i + 3] = alpha;
    }
  }
  ctx.putImageData(img, 0, 0);
  return c;
}

// Bg velvet — anisotropic pixel-level, larger scale than tray
function genBgVelvet(sheenHex, w, h) {
  const c = makeCanvas(w, h);
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(w, h);
  const [sr,sg,sb] = hexToRgb(sheenHex);
  function hash(x,y){let n=Math.sin(x*127.1+y*311.7)*43758.5453;return n-Math.floor(n);}
  function vn(x,y){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy,ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);return hash(ix,iy)*(1-ux)*(1-uy)+hash(ix+1,iy)*ux*(1-uy)+hash(ix,iy+1)*(1-ux)*uy+hash(ix+1,iy+1)*ux*uy;}
  function fbm(x,y,o){let v=0,a=1,f=1,t=0;for(let i=0;i<o;i++){v+=vn(x*f,y*f)*a;t+=a;a*=0.5;f*=2.1;}return v/t;}
  for(let y=0;y<h;y++){for(let x=0;x<w;x++){
    const napAngle=(fbm(x*0.004,y*0.004,3)-0.5)*Math.PI*0.5+Math.PI*0.3;
    const lx=0.577,ly=-0.577;
    const grain=fbm(x*0.2,y*0.2,3);
    const fw=(grain-0.5)*0.25;
    const pa=napAngle+Math.PI*0.5+fw;
    const dotL=lx*Math.cos(pa)+ly*Math.sin(pa);
    const sheen=Math.pow(Math.max(0,dotL*0.5+0.5),2.2);
    const shadow=fbm(x*0.15,y*0.15,3);
    const ss=Math.pow(shadow,0.7)*0.5+0.5;
    const zone=fbm(x*0.002,y*0.002,2)*0.4+0.8;
    const b=(sheen*0.7+ss*0.3)*zone;
    const i=(y*w+x)*4;
    img.data[i]=Math.min(255,Math.round(sr*b*1.2));
    img.data[i+1]=Math.min(255,Math.round(sg*b*1.2));
    img.data[i+2]=Math.min(255,Math.round(sb*b*1.2));
    img.data[i+3]=Math.min(255,Math.round(b*160));
  }}
  ctx.putImageData(img,0,0);
  return c;
}

// Bg slate — same diagonal shear-plane approach at lower frequency (wider bands)
function genBgSlate(midHex, lightHex, w, h) {
  const c = makeCanvas(w, h);
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(w, h);
  const [mr,mg,mb]=hexToRgb(midHex);
  const [lr,lg,lb]=hexToRgb(lightHex);
  function hash(x,y){let n=Math.sin(x*127.1+y*311.7)*43758.5453;return n-Math.floor(n);}
  function vn(x,y){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy,ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);return hash(ix,iy)*(1-ux)*(1-uy)+hash(ix+1,iy)*ux*(1-uy)+hash(ix,iy+1)*(1-ux)*uy+hash(ix+1,iy+1)*ux*uy;}
  function fbm(x,y,o){let v=0,a=1,f=1,t=0;for(let i=0;i<o;i++){v+=vn(x*f,y*f)*a;t+=a;a*=0.55;f*=2.0;}return v/t;}
  const cos_a=Math.cos(Math.PI*0.72), sin_a=Math.sin(Math.PI*0.72);
  const lx=0.5,ly=-0.7,lz=0.51;
  for(let y=0;y<h;y++){for(let x=0;x<w;x++){
    // Lower frequency — wider shear bands for background scale
    const su=x*cos_a+y*sin_a, sv=-x*sin_a+y*cos_a;
    const warp=fbm(su*0.0015,sv*0.0015,3)*80;
    const band1=fbm((sv+warp)*0.006,su*0.001,4);
    const band2=fbm((sv+warp*0.6)*0.0035+10.3,su*0.0005+5.1,3);
    const bandVal=band1*0.6+band2*0.4;
    const grain=fbm(x*0.11,y*0.11,3);
    const veinWarp=fbm(su*0.004+2.1,sv*0.004,3)*55;
    const veinPhase=(sv+veinWarp)*0.014;
    const vein1=Math.pow(Math.max(0,Math.sin(veinPhase+0.3)),8);
    const vein2=Math.pow(Math.max(0,Math.sin(veinPhase*2.3+1.7)),12);
    const vein3=Math.pow(Math.max(0,Math.sin(veinPhase*0.5+4.1)),6)*0.5;
    const veinMod=fbm(su*0.003,sv*0.001+20,3)*0.7+0.3;
    const vein=(vein1*0.5+vein2*0.35+vein3*0.15)*veinMod;
    const eps=2;
    const bx=fbm((sv+warp+eps)*0.006,su*0.001,3)-fbm((sv+warp-eps)*0.006,su*0.001,3);
    const by=fbm((sv+warp)*0.006,(su+eps)*0.001,3)-fbm((sv+warp)*0.006,(su-eps)*0.001,3);
    const nl=Math.sqrt(bx*bx+by*by+0.08);
    const nx=-bx/nl*1.5,ny=by/nl*1.5,nz=0.28/nl;
    const diffuse=Math.max(0.15,nx*lx+ny*ly+nz*lz);
    const spec=Math.pow(Math.max(0,diffuse),22)*0.4;
    const shadow=Math.pow(1-bandVal,2.5)*0.35;
    const t=bandVal*0.6+grain*0.25+vein*0.15;
    const baseR=mr+(lr-mr)*t, baseG=mg+(lg-mg)*t, baseB=mb+(lb-mb)*t;
    const lit=diffuse*(1-shadow);
    const veinR=Math.min(255,baseR*(1-vein*0.7)+230*vein*0.7+spec*180);
    const veinG=Math.min(255,baseG*(1-vein*0.7)+228*vein*0.7+spec*185);
    const veinB=Math.min(255,baseB*(1-vein*0.7)+235*vein*0.7+spec*200);
    const i=(y*w+x)*4;
    img.data[i]=Math.min(255,Math.max(0,Math.round(veinR*lit)));
    img.data[i+1]=Math.min(255,Math.max(0,Math.round(veinG*lit)));
    img.data[i+2]=Math.min(255,Math.max(0,Math.round(veinB*lit)));
    img.data[i+3]=Math.min(255,Math.round((t*0.7+vein*0.5+grain*0.2)*255));
  }}
  ctx.putImageData(img,0,0);
  return c;
}

// Bg parchment — same smooth fibre-flow approach, lower frequency than tray
function genBgParchment(darkHex, w, h) {
  const c = makeCanvas(w, h);
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(w, h);
  const [dr,dg,db] = hexToRgb(darkHex);
  function hash(x,y){let n=Math.sin(x*127.1+y*311.7)*43758.5453;return n-Math.floor(n);}
  function vn(x,y){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy,ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);return hash(ix,iy)*(1-ux)*(1-uy)+hash(ix+1,iy)*ux*(1-uy)+hash(ix,iy+1)*(1-ux)*uy+hash(ix+1,iy+1)*ux*uy;}
  function fbm(x,y,o){let v=0,a=1,f=1,t=0;for(let i=0;i<o;i++){v+=vn(x*f,y*f)*a;t+=a;a*=0.5;f*=2.1;}return v/t;}
  for(let y=0;y<h;y++){for(let x=0;x<w;x++){
    const tone=fbm(x*0.0025,y*0.0025,3);
    const flowWarp=fbm(x*0.0075,y*0.0075,3)*40;
    const fibreU=x*0.7+flowWarp, fibreV=y*0.08;
    const fibre=fbm(fibreU*0.02,fibreV*0.2,4);
    const tooth=fbm(x*0.22,y*0.22,3)*0.12;
    const surface=tone*0.5+fibre*0.35+tooth;
    const ex=(x/w-0.5)*2, ey=(y/h-0.5)*2;
    const vignette=Math.max(0,ex*ex+ey*ey-0.2)*0.3;
    const bright=surface-vignette;
    const alpha=Math.min(255,Math.round(Math.abs(bright-0.5)*160));
    const sign=bright>0.5?1:-1;
    const r=sign>0?255:dr, g=sign>0?245:dg, b=sign>0?220:db;
    const i=(y*w+x)*4;
    img.data[i]=r;img.data[i+1]=g;img.data[i+2]=b;img.data[i+3]=alpha;
  }}
  ctx.putImageData(img,0,0);
  return c;
}

// Bg ocean — double-warped caustics at lower spatial frequency
function genBgOcean(causticHex, w, h) {
  const c = makeCanvas(w, h);
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(w, h);
  const [cr,cg,cb]=hexToRgb(causticHex);
  function hash(x,y){let n=Math.sin(x*127.1+y*311.7)*43758.5453;return n-Math.floor(n);}
  function vn(x,y){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy,ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);return hash(ix,iy)*(1-ux)*(1-uy)+hash(ix+1,iy)*ux*(1-uy)+hash(ix,iy+1)*(1-ux)*uy+hash(ix+1,iy+1)*ux*uy;}
  function fbm(x,y,o){let v=0,a=1,f=1,t=0;for(let i=0;i<o;i++){v+=vn(x*f,y*f)*a;t+=a;a*=0.5;f*=2.1;}return v/t;}
  for(let y=0;y<h;y++){for(let x=0;x<w;x++){
    // Half the frequency of tray — larger caustic blobs on background
    const wx1=fbm(x*0.004,y*0.004,4)*55, wy1=fbm(x*0.004+3.7,y*0.004+5.2,4)*55;
    const wx2=fbm((x+wx1)*0.003,(y+wy1)*0.003,3)*40, wy2=fbm((x+wx1)*0.003+8.1,(y+wy1)*0.003+2.4,3)*40;
    const wx=x+wx1+wx2, wy=y+wy1+wy2;
    const c1=Math.sin(wx*0.016+wy*0.012)*0.5+0.5;
    const c2=Math.sin(wx*0.025-wy*0.019+2.1)*0.5+0.5;
    const c3=Math.sin(-wx*0.013+wy*0.030+4.6)*0.5+0.5;
    const c4=Math.sin(wx*0.009+wy*0.036+1.3)*0.5+0.5;
    const caustic=Math.pow(c1*c2*c3*c4,0.55);
    const depth=fbm(x*0.002,y*0.003,3)*0.35+0.65;
    const scatter=Math.pow(Math.max(0,caustic-0.6),2)*4.0;
    const sparkSeed=hash(Math.floor(x*0.5)*1.3+0.7,Math.floor(y*0.5)*1.7+0.3);
    const spark=sparkSeed>0.994?(sparkSeed-0.994)/0.006*2.0:0;
    const total=caustic*depth+scatter*0.5+spark*0.6;
    const rr=Math.min(255,Math.round((cr*caustic*0.8+220*scatter*0.15+255*spark*0.4)*depth));
    const rg=Math.min(255,Math.round((cg*caustic*0.8+240*scatter*0.35+255*spark*0.6)*depth));
    const rb=Math.min(255,Math.round((cb*caustic*0.8+255*scatter*0.55+255*spark)*depth));
    const i=(y*w+x)*4;
    img.data[i]=rr;img.data[i+1]=rg;img.data[i+2]=rb;
    img.data[i+3]=Math.min(255,Math.round(total*200));
  }}
  ctx.putImageData(img,0,0);
  return c;
}

// Bg forge — wider Voronoi cells, Voronoi+pixel glow for background scale
function genBgForge(glowHex, w, h) {
  const c = makeCanvas(w, h);
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(w, h);
  const [gr,gg,gb]=hexToRgb(glowHex);
  function hash(x,y){let n=Math.sin(x*127.1+y*311.7)*43758.5453;return n-Math.floor(n);}
  function vn(x,y){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy,ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);return hash(ix,iy)*(1-ux)*(1-uy)+hash(ix+1,iy)*ux*(1-uy)+hash(ix,iy+1)*(1-ux)*uy+hash(ix+1,iy+1)*ux*uy;}
  function fbm(x,y,o){let v=0,a=1,f=1,t=0;for(let i=0;i<o;i++){v+=vn(x*f,y*f)*a;t+=a;a*=0.5;f*=2.1;}return v/t;}
  const NC=45;
  const cells=Array.from({length:NC},(_,i)=>({x:hash(i,0.1)*w,y:hash(i,0.2)*h,heat:Math.pow(hash(i,0.3),2.5)}));
  for(let y=0;y<h;y++){for(let x=0;x<w;x++){
    let d1=1e9,d2=1e9,c1i=0;
    for(let i=0;i<NC;i++){const dx=x-cells[i].x,dy=y-cells[i].y,d=dx*dx+dy*dy;if(d<d1){d2=d1;d1=d;c1i=i;}else if(d<d2){d2=d;}}
    const edge=Math.sqrt(d2)-Math.sqrt(d1);
    const crackW=4+fbm(x*0.01,y*0.01,2)*5;
    const crackT=edge<crackW?1-(edge/crackW):0;
    const rg2=fbm(x*0.08,y*0.08,4);
    const rs=fbm(x*0.02,y*0.02,3);
    const eps=1;
    const dfdx=fbm((x+eps)*0.02,y*0.02,3)-fbm((x-eps)*0.02,y*0.02,3);
    const dfdy=fbm(x*0.02,(y+eps)*0.02,3)-fbm(x*0.02,(y-eps)*0.02,3);
    const nl=Math.sqrt(dfdx*dfdx+dfdy*dfdy+0.01);
    const nx2=-dfdx/nl,ny2=-dfdy/nl,nz2=0.1/nl;
    const diff=Math.max(0,nx2*0.5+ny2*(-0.6)+nz2*0.62);
    const spec=Math.pow(diff,12)*rg2;
    const heat=cells[c1i].heat;
    const glowI=crackT*(0.3+heat*1.4);
    const ambG=Math.exp(-edge*0.04)*heat*0.5;
    const rockB=(rs*0.4+rg2*0.3)*(0.3+diff*0.7);
    const rockR=Math.round(20+rockB*35+spec*60);
    const rockG2=Math.round(18+rockB*30+spec*55);
    const rockBl=Math.round(22+rockB*40+spec*70);
    const glowR=Math.min(255,Math.round(gr*1.4*glowI+ambG*gr*0.6));
    const glowG2=Math.min(255,Math.round(gg*0.7*glowI+ambG*gg*0.3));
    const glowBl=Math.min(255,Math.round(gb*0.2*glowI));
    const gT=Math.pow(glowI+ambG*0.5,0.7);
    const i=(y*w+x)*4;
    img.data[i]=Math.min(255,Math.max(0,Math.round(rockR*(1-gT)+glowR*gT)));
    img.data[i+1]=Math.min(255,Math.max(0,Math.round(rockG2*(1-gT)+glowG2*gT)));
    img.data[i+2]=Math.min(255,Math.max(0,Math.round(rockBl*(1-gT)+glowBl*gT)));
    img.data[i+3]=Math.min(255,Math.round((rockB*0.6+glowI*1.2+ambG*0.8)*255));
  }}
  ctx.putImageData(img,0,0);
  for(let i=0;i<60;i++){
    const ex=Math.random()*w,ey=Math.random()*h,er=1+Math.random()*4,ea=0.3+Math.random()*0.5;
    const grd=ctx.createRadialGradient(ex,ey,0,ex,ey,er*4);
    grd.addColorStop(0,`rgba(255,240,180,${ea})`);
    grd.addColorStop(0.4,`rgba(${gr},${Math.round(gg*0.5)},0,${ea*0.5})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(ex,ey,er*4,0,Math.PI*2);ctx.fill();
  }
  return c;
}

function applyTrayTheme(themeKey) {
  const theme = TRAY_THEMES[themeKey];
  if (!theme) return;
  const root = document.documentElement;
  const varNames = [
    'felt-1','felt-2','chalk','chalk-dim','brass','brass-dim','ink','ember',
    'font-title','font-ui',
    'btn-bg','btn-border','btn-hover-bg',
    'roll-btn-grad-top','roll-btn-grad-bot','roll-btn-ink',
    'adv-btn-bg','adv-btn-border','adv-btn-hover-bg',
    'disadv-btn-bg','disadv-btn-border','disadv-btn-hover-bg',
    'surface-line','surface-line-dim','tray-bg',
  ];
  varNames.forEach(v => {
    if (theme[v] !== undefined) root.style.setProperty('--' + v, theme[v]);
  });

  // Apply canvas-generated tray surface texture
  const trayUrl = TRAY_TEXTURES[themeKey];
  if (trayUrl) {
    root.style.setProperty('--tray-texture', `url("${trayUrl}")`);
  } else {
    root.style.setProperty('--tray-texture', 'none');
  }

  // Paint background canvas
  paintBgCanvas(themeKey);

  // Update the option background in the colour-scheme-selects to match
  document.querySelectorAll('.colour-scheme-select option').forEach(opt => {
    opt.style.background = theme['felt-1'];
    opt.style.color = theme['chalk'];
  });
}

document.getElementById('tray-theme-select').addEventListener('change', (e) => {
  applyTrayTheme(e.target.value);
  renderDiceCanvas();
});


/* =========================================================================
   LAZY TEXTURE SYSTEM
   No Worker (CSP blocks blob workers in this environment).
   Green-felt generates synchronously on load (fast enough to be imperceptible).
   All other themes queue via setTimeout(0) — one task per tick — so the
   browser stays fully responsive between each generation.
   bg-canvas is sized to screen dimensions once and never resized on scroll.
   ========================================================================= */

const TRAY_TEXTURES = {};  // key → data URL
const BG_BITMAPS    = {};  // key → HTMLCanvasElement

const THEME_ORDER = [
  'mahogany','midnight-velvet','parchment','slate-stone',
  'deep-ocean','ember-forge','ivory-marble'
];

const BG_W = Math.max(screen.width  || 0, window.innerWidth);
const BG_H = Math.max(screen.height || 0, window.innerHeight);

(function() {
  const c = document.getElementById('bg-canvas');
  c.width = BG_W; c.height = BG_H;
})();

function buildTrayTexture(key) {
  const map = {
    'green-felt':      () => genFeltTexture('#2a6b50'),
    'mahogany':        () => genWoodTexture('#0a0200','#c87840'),
    'midnight-velvet': () => genVelvetTexture('#c0a8ff'),
    'parchment':       () => genParchmentTexture('#6a3010'),
    'slate-stone':     () => genSlateTexture('#4a5a68','#8aa0b0'),
    'deep-ocean':      () => genOceanTexture('#40b8e0'),
    'ember-forge':     () => genForgeTexture('#ff6020'),
    'ivory-marble':    () => genMarbleTexture('#8090b8','#4a5080'),
  };
  if (map[key]) TRAY_TEXTURES[key] = map[key]();
}

function buildBgCanvas(key, w, h) {
  const theme = TRAY_THEMES[key];
  if (!theme) return;
  const c = makeCanvas(w, h);
  const ctx = c.getContext('2d');
  const grd = ctx.createLinearGradient(0, 0, w*0.7, h);
  grd.addColorStop(0, theme['felt-1']); grd.addColorStop(1, theme['felt-2']);
  ctx.fillStyle = grd; ctx.fillRect(0, 0, w, h);
  const sh = ctx.createRadialGradient(w*0.5, 0, 0, w*0.5, 0, w*0.7);
  sh.addColorStop(0, 'rgba(255,255,255,0.04)'); sh.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = sh; ctx.fillRect(0, 0, w, h);
  const texMap = {
    'green-felt':      () => genBgFelt('#2a6b50','#1a4a30', w, h),
    'mahogany':        () => genBgWood('#080100','#c87040', w, h),
    'midnight-velvet': () => genBgVelvet('#c0a8ff', w, h),
    'parchment':       () => genBgParchment('#6a3010', w, h),
    'slate-stone':     () => genBgSlate('#4a5a68','#8aa0b0', w, h),
    'deep-ocean':      () => genBgOcean('#30a8c8', w, h),
    'ember-forge':     () => genBgForge('#ff5818', w, h),
    'ivory-marble':    () => genBgMarble('#7080a8','#404870', w, h),
  };
  if (texMap[key]) {
    const tex = texMap[key]();
    ctx.globalAlpha = 0.45; ctx.drawImage(tex, 0, 0); ctx.globalAlpha = 1;
  }
  BG_BITMAPS[key] = c;
}

function paintBgCanvas(themeKey) {
  const src = BG_BITMAPS[themeKey];
  if (!src) return;
  document.getElementById('bg-canvas').getContext('2d').drawImage(src, 0, 0);
}

// Queue: one task per setTimeout(0) tick
let _queue = [], _queueRunning = false;
function enqueue(fn) {
  _queue.push(fn);
  if (!_queueRunning) drainQueue();
}
function drainQueue() {
  if (!_queue.length) { _queueRunning = false; return; }
  _queueRunning = true;
  const task = _queue.shift();
  setTimeout(() => { task(); drainQueue(); }, 0);
}

function initTextures() {
  // Green felt: synchronous — done before applyTrayTheme runs below
  buildTrayTexture('green-felt');
  buildBgCanvas('green-felt', BG_W, BG_H);

  // Everything else: one task per tick, browser stays responsive
  for (const key of THEME_ORDER) {
    const k = key;
    enqueue(() => {
      buildTrayTexture(k);
      const active = document.getElementById('tray-theme-select').value || 'green-felt';
      if (k === active) {
        document.documentElement.style.setProperty('--tray-texture', `url("${TRAY_TEXTURES[k]}")`);
      }
    });
    enqueue(() => {
      buildBgCanvas(k, BG_W, BG_H);
      const active = document.getElementById('tray-theme-select').value || 'green-felt';
      if (k === active) paintBgCanvas(k);
    });
  }
}

// Resize: ignore height changes (scroll/browser chrome) — only rebuild on width change
let _lastBgWidth = BG_W, _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    const newW = window.innerWidth;
    if (Math.abs(newW - _lastBgWidth) < 40) return;
    _lastBgWidth = newW;
    for (const k of Object.keys(BG_BITMAPS)) delete BG_BITMAPS[k];
    const w2 = Math.max(screen.width || 0, newW);
    const canvas = document.getElementById('bg-canvas');
    canvas.width = w2;
    const active = document.getElementById('tray-theme-select').value || 'green-felt';
    buildBgCanvas(active, w2, BG_H);
    paintBgCanvas(active);
    for (const k of ['green-felt', ...THEME_ORDER]) {
      if (k !== active) enqueue(() => buildBgCanvas(k, w2, BG_H));
    }
  }, 200);
});

/* =========================================================================
   INIT
   ========================================================================= */
rebuildField();
initTextures();
applyTrayTheme('green-felt');
</script>
</body>
</html>
