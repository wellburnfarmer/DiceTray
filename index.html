let order = [20]; // flat list of sides values, one per die, in the order they were added
let dice = [];
let rolling = false;
let history = [];

// Persists across separate Advantage/Disadvantage rolls: which physical
// role currently "holds" the normal cream dice colour. The other role is
// rendered in the inverted dark colour scheme (black body, white numeral)
// so it's visually obvious which set is which while both are on the felt
// mid-roll. Cream always follows whichever side actually won — if the
// dark-styled side wins a roll, cream moves to that role for next time; if
// the cream-styled side wins, nothing changes. It only ever means anything
// during an advantage/disadvantage roll (a plain "Roll the tray" never
// touches or reads this), so its literal value at rest is arbitrary; it's
// re-evaluated fresh at the end of every adv/disadv roll based on that
// roll's own outcome.
let advCreamRole = 'original'; // 'original' | 'duplicate'

function poolCounts() {
  const counts = {};
  order.forEach((sides) => { counts[sides] = (counts[sides] || 0) + 1; });
  return counts;
}

function totalCount() {
  return order.length;
}

const DIE_PIXEL_SIZE = 64; // on-screen footprint of one die, before devicePixelRatio scaling
const DIE_GAP = 22;

// A standalone die model with a small randomized rest tilt, so dice freshly
// placed on the felt don't all sit at the exact same dead-flat orientation.
// Shared by rebuildField (building the felt from `order`) and the
// advantage/disadvantage doubling logic (building extra dice that were
// never added to `order`).
function buildFreshDie(sides, isPercentileUnit) {
  const die = buildDieModel(sides, isPercentileUnit);
  const restX = rollFloat(-12, 12);
  const restY = rollFloat(-12, 12);
  const qx = quatFromAxisAngle([1, 0, 0], restX);
  const qy = quatFromAxisAngle([0, 1, 0], restY);
  die.currentQuat = quatMultiply(qy, qx);
  return die;
}

function rebuildField() {
  // A d100 in `order` is always immediately followed by its companion d10
  // (see addOne/removeOne), since percentile rolls are read off a tens die
  // and a units die together. Here we tag that pairing on the built dice
  // themselves — pairId links the two, isPercentileUnit marks the units
  // die — so layout, rendering, hit-testing and scoring can all treat the
  // pair as a single percentile entry rather than two independent dice.

  // Snapshot the colour scheme of every non-unit die currently on the felt,
  // in order, so we can re-apply it after rebuilding. The felt's logical
  // order (i.e. `order`) only ever changes by one entry at a time
  // (addOne/removeOne/clearAll), so the first N surviving slots map 1-to-1
  // to the first N entries in the snapshot. Newly added dice get the scheme
  // that matches the currently non-cream side — i.e. if the dark side last
  // won an advantage roll, new dice are dark too, so they stay visually
  // consistent with the existing tray until cream next wins.
  const existingSchemes = dice
    .filter((d) => !d.isPercentileUnit)
    .map((d) => d.colorScheme);
  // New dice match whatever colour is already on the tray so a freshly
  // added die doesn't visually jar. Majority rules; cream wins on a tie.
  const darkCount = existingSchemes.filter((s) => s === 'dark').length;
  const newDieScheme = darkCount > existingSchemes.length - darkCount ? 'dark' : 'cream';

  dice = [];
  let pairCounter = 0;
  let slotIndex = 0; // tracks position into existingSchemes
  for (let i = 0; i < order.length; i++) {
    const sides = order[i];
    const die = buildFreshDie(sides);
    // Re-apply saved scheme if this slot existed before, otherwise use the
    // scheme appropriate for new dice given the current advCreamRole state.
    die.colorScheme = slotIndex < existingSchemes.length ? existingSchemes[slotIndex] : newDieScheme;
    slotIndex++;

    if (sides === 100) {
      const pairId = pairCounter++;
      die.pairId = pairId;
      const unitDie = buildDieModel(10, true);
      unitDie.currentQuat = die.currentQuat;
      unitDie.pairId = pairId;
      unitDie.isPercentileUnit = true;
      unitDie.colorScheme = die.colorScheme; // unit die always matches its tens die
      die.unitDie = unitDie;
      dice.push(die, unitDie);
      i++; // skip the companion d10 already consumed from `order`
    } else {
      dice.push(die);
    }
  }

  layoutDiceGrid();
  updateCountLabel();
  updateGroupList();
  refreshPickerDisabled();
  refreshAdvantageButtons();
  renderDiceCanvas();

  document.getElementById('tray-empty').style.display = dice.length === 0 ? 'flex' : 'none';
}

// A "slot" is one position in the felt grid. A standalone die is its own
// slot; a percentile pair (d100 + its companion d10) shares a single slot,
// so the tray fills up by visual entries, not raw die count.
function diceSlots() {
  const slots = [];
  dice.forEach((die) => {
    if (die.isPercentileUnit) return; // drawn as part of its pair's slot, not its own
    slots.push(die);
  });
  return slots;
}

const PERCENTILE_SUB_SCALE = 0.62; // each die in a percentile pair, relative to a normal die
const PERCENTILE_SUB_OFFSET = 19; // horizontal offset of each sub-die from the slot center

// Shared by the normal grid and the advantage/disadvantage doubled grid:
// given a flat cell index and how many columns fit per row, returns that
// cell's center point using the standard cellSpan-sized grid.
function cellCenter(index, cols, cellSpan) {
  const col = index % cols;
  const row = Math.floor(index / cols);
  return {
    x: col * cellSpan + cellSpan / 2,
    y: row * cellSpan + cellSpan / 2 - DIE_GAP / 2 + 10,
    row,
  };
}

function gridColsForWidth(fieldWidth, cellSpan) {
  return Math.max(1, Math.floor((fieldWidth + DIE_GAP) / cellSpan));
}

function layoutDiceGrid() {
  const field = document.getElementById('dice-field');
  const canvas = document.getElementById('dice-canvas');
  const fieldWidth = field.clientWidth || 600;
  const cellSpan = DIE_PIXEL_SIZE + DIE_GAP;
  const slots = diceSlots();
  const cols = gridColsForWidth(fieldWidth, cellSpan);
  const rows = Math.max(1, Math.ceil(slots.length / cols));

  slots.forEach((die, i) => {
    const { x: slotX, y: slotY } = cellCenter(i, cols, cellSpan);
    if (die.sides === 100) {
      // Tens die sits slightly left, its companion units die slightly
      // right, both shrunk a touch so the pair reads as one entry.
      die.screenX = slotX - PERCENTILE_SUB_OFFSET;
      die.screenY = slotY;
      die.drawScale = PERCENTILE_SUB_SCALE;
      die.unitDie.screenX = slotX + PERCENTILE_SUB_OFFSET;
      die.unitDie.screenY = slotY;
      die.unitDie.drawScale = PERCENTILE_SUB_SCALE;
    } else {
      die.screenX = slotX;
      die.screenY = slotY;
      die.drawScale = 1;
    }
  });

  const totalHeight = slots.length === 0 ? 120 : rows * cellSpan + 20;
  field.style.minHeight = totalHeight + 'px';

  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = fieldWidth * dpr;
  canvas.height = totalHeight * dpr;
  canvas.style.height = totalHeight + 'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

const ADV_PAIR_SCALE = 0.78; // each die in an advantage/disadvantage doubled pair, relative to a normal die

// Lays out the felt for the doubled, mid-advantage-roll arrangement: each
// original die's one slot becomes two adjacent cells (original + its
// rolled-twice duplicate), and everything after it shifts along by one
// cell — literally doubling the grid rather than shrinking dice down to
// fit twice as many into the same space, so every result is fully legible
// while both are visible side by side.
//
// `groups` is an ordered list of { original, duplicate } pairs (or, for a
// percentile pair, { original: {tens, units}, duplicate: {tens, units} } —
// see buildAdvantageGroups). Each group consumes 2 consecutive cells.
//
// Alongside the doubled-layout position, this also precomputes and stores
// each die's eventual *collapsed* position — where it will end up sitting
// once the loser of its group fades out and the felt returns to one slot
// per group — onto die._collapseFinalX/Y. The later collapse animation
// just interpolates screenX/Y from where layoutDoubledGrid put it toward
// that stored final point; it never needs to re-run grid math mid-animation.
function layoutDoubledGrid(groups) {
  const field = document.getElementById('dice-field');
  const canvas = document.getElementById('dice-canvas');
  const fieldWidth = field.clientWidth || 600;
  const cellSpan = DIE_PIXEL_SIZE + DIE_GAP;
  const cols = gridColsForWidth(fieldWidth, cellSpan);
  const doubledCellCount = groups.length * 2;
  const rows = Math.max(1, Math.ceil(doubledCellCount / cols));

  // Final (collapsed) positions use the ordinary one-cell-per-group grid —
  // exactly what layoutDiceGrid would produce for these groups' originals.
  const finalCols = gridColsForWidth(fieldWidth, cellSpan);

  function placeDieAt(die, cellIndex, colsForThisGrid) {
    const { x, y } = cellCenter(cellIndex, colsForThisGrid, cellSpan);
    return { x, y };
  }

  groups.forEach((group, groupIndex) => {
    const doubledIndexA = groupIndex * 2;
    const doubledIndexB = groupIndex * 2 + 1;
    const finalIndex = groupIndex;

    if (group.kind === 'percentile') {
      const { tens: origTens, units: origUnits } = group.original;
      const { tens: dupTens, units: dupUnits } = group.duplicate;
      const a = placeDieAt(origTens, doubledIndexA, cols);
      const b = placeDieAt(dupTens, doubledIndexB, cols);
      const final = placeDieAt(origTens, finalIndex, finalCols);

      origTens.screenX = a.x - PERCENTILE_SUB_OFFSET; origTens.screenY = a.y; origTens.drawScale = PERCENTILE_SUB_SCALE;
      origUnits.screenX = a.x + PERCENTILE_SUB_OFFSET; origUnits.screenY = a.y; origUnits.drawScale = PERCENTILE_SUB_SCALE;
      dupTens.screenX = b.x - PERCENTILE_SUB_OFFSET; dupTens.screenY = b.y; dupTens.drawScale = PERCENTILE_SUB_SCALE;
      dupUnits.screenX = b.x + PERCENTILE_SUB_OFFSET; dupUnits.screenY = b.y; dupUnits.drawScale = PERCENTILE_SUB_SCALE;

      // Both the original pair and the duplicate pair collapse toward the
      // SAME final slot (whichever pair wins keeps that one spot); offsets
      // within the slot match the normal percentile layout exactly.
      [origTens, dupTens].forEach((d) => { d._collapseFinalX = final.x - PERCENTILE_SUB_OFFSET; d._collapseFinalY = final.y; d._collapseFinalScale = PERCENTILE_SUB_SCALE; });
      [origUnits, dupUnits].forEach((d) => { d._collapseFinalX = final.x + PERCENTILE_SUB_OFFSET; d._collapseFinalY = final.y; d._collapseFinalScale = PERCENTILE_SUB_SCALE; });
    } else {
      const { original, duplicate } = group;
      const a = placeDieAt(original, doubledIndexA, cols);
      const b = placeDieAt(duplicate, doubledIndexB, cols);
      const final = placeDieAt(original, finalIndex, finalCols);

      original.screenX = a.x; original.screenY = a.y; original.drawScale = ADV_PAIR_SCALE;
      duplicate.screenX = b.x; duplicate.screenY = b.y; duplicate.drawScale = ADV_PAIR_SCALE;

      original._collapseFinalX = final.x; original._collapseFinalY = final.y; original._collapseFinalScale = 1;
      duplicate._collapseFinalX = final.x; duplicate._collapseFinalY = final.y; duplicate._collapseFinalScale = 1;
    }
  });

  const totalHeight = doubledCellCount === 0 ? 120 : rows * cellSpan + 20;
  field.style.minHeight = totalHeight + 'px';

  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = fieldWidth * dpr;
  canvas.height = totalHeight * dpr;
  canvas.style.height = totalHeight + 'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

/* =========================================================================
   CANVAS RENDERING — every die is drawn as flat-filled polygons on one
   shared canvas, with rotation/backface-culling/projection/depth-sorting
   all done by hand in JS. This keeps total rendered-element count at one
   regardless of dice count, which is what actually scales: a full 20-die
   tray of d20s is 400 individual faces, and 400 simultaneous 3D-composited
   DOM layers is more than some mobile GPUs reliably composite every frame
   — that mismatch is what caused faces to flicker invisible under load.
   ========================================================================= */
const PROJECTION_FOCAL = 900;
const PROJECTION_CAMERA_DIST = 900;

function projectPoint(point3d, centerX, centerY, scale) {
  const [x, y, z] = point3d;
  const denom = PROJECTION_CAMERA_DIST - z * scale;
  const factor = PROJECTION_FOCAL / denom;
  return [centerX + x * scale * factor, centerY - y * scale * factor];
}

function numeralRotationRad(rotatedUp) {
  const dx = rotatedUp[0];
  const dy = -rotatedUp[1];
  const refx = 0, refy = -1;
  const cross = refx * dy - refy * dx;
  const dot = refx * dx + refy * dy;
  return Math.atan2(cross, dot);
}

function renderDiceCanvas() {
  const canvas = document.getElementById('dice-canvas');
  const ctx = canvas.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  dice.forEach((die) => {
    drawDie(ctx, die);
  });
}

// Shared scratch array for the "visible faces" list built during drawDie.
// Dice are always rendered one at a time (renderDiceCanvas loops over them
// sequentially), so a single shared, pre-sized buffer is safe to reuse
// across every die and every frame, avoiding a fresh array of fresh
// {face, ...} objects on every single render call. Sized generously for
// the largest face count among supported dice (d20 = 20 faces).
const visibleFacesScratch = Array.from({ length: 20 }, () => ({ face: null, rotCentroid: null, rotUp: null, rotVerts: null }));

function drawDie(ctx, die) {
  const rotMat = quatToMatrix(die.currentQuat);
  const scale = DIE_SCALE * (die.drawScale || 1);
  const cx = die.screenX, cy = die.screenY;
  // Used by the advantage/disadvantage collapse animation to fade a
  // discarded die out in place. Defaults to fully opaque for every other
  // die / every other moment in the app.
  const dieOpacity = die.drawOpacity === undefined ? 1 : die.drawOpacity;
  if (dieOpacity <= 0.01) return; // fully faded out — skip drawing entirely

  // Rotate + project every face; keep only those facing the camera. All
  // rotated vectors are written into scratch buffers pre-allocated in
  // buildDieModel, and the visible-faces list is built in the shared
  // visibleFacesScratch array, rather than allocating fresh arrays/objects
  // here — this loop runs for every face of every die on every frame of
  // a tumble, so avoiding per-frame allocation here is what matters most.
  let visibleCount = 0;
  die.faces.forEach((face) => {
    applyMatrixToVectorInto(face._rotNormal, rotMat, face.normal);
    if (face._rotNormal[2] <= 0.02) return; // backface culled
    applyMatrixToVectorInto(face._rotCentroid, rotMat, face.centroid);
    applyMatrixToVectorInto(face._rotUp, rotMat, face.up);
    for (let i = 0; i < face.verts3d.length; i++) {
      applyMatrixToVectorInto(face._rotVerts[i], rotMat, face.verts3d[i]);
    }
    const slot = visibleFacesScratch[visibleCount++];
    slot.face = face;
    slot.rotCentroid = face._rotCentroid;
    slot.rotUp = face._rotUp;
    slot.rotVerts = face._rotVerts;
  });

  // Insertion sort over just [0, visibleCount) — visible face counts are
  // always small (at most half a die's faces, so ≤10 for a d20), where
  // insertion sort beats Array.prototype.sort's overhead, and critically
  // it sorts in place on a fixed-size shared buffer with no slicing,
  // array-length mutation, or new-array allocation needed.
  for (let i = 1; i < visibleCount; i++) {
    const cur = visibleFacesScratch[i];
    const curZ = cur.rotCentroid[2];
    let j = i - 1;
    while (j >= 0 && visibleFacesScratch[j].rotCentroid[2] > curZ) {
      visibleFacesScratch[j + 1] = visibleFacesScratch[j];
      j--;
    }
    visibleFacesScratch[j + 1] = cur;
  }

  for (let i = 0; i < visibleCount; i++) {
    const { face, rotCentroid, rotUp, rotVerts } = visibleFacesScratch[i];
    drawFaceFill(ctx, die, face, rotVerts, cx, cy, scale, dieOpacity);
  }
  for (let i = 0; i < visibleCount; i++) {
    const { face, rotCentroid, rotUp, rotVerts } = visibleFacesScratch[i];
    drawFaceStroke(ctx, die, face, rotVerts, cx, cy, scale, dieOpacity);
  }
  for (let i = 0; i < visibleCount; i++) {
    const { face, rotCentroid, rotUp, rotVerts } = visibleFacesScratch[i];
    drawFaceNumeral(ctx, die, face, rotCentroid, rotUp, rotVerts, cx, cy, scale, dieOpacity);
  }
}

function pointToSegmentDist(px, py, ax, ay, bx, by) {
  const abx = bx - ax, aby = by - ay;
  const apx = px - ax, apy = py - ay;
  const abLenSq = abx * abx + aby * aby;
  let t = abLenSq > 0 ? (apx * abx + apy * aby) / abLenSq : 0;
  t = Math.max(0, Math.min(1, t));
  const cx = ax + t * abx, cy = ay + t * aby;
  return Math.hypot(px - cx, py - cy);
}

function polygonInradiusFromPoint(px, py, points) {
  // Distance from (px,py) to the nearest edge of the polygon — i.e. the
  // largest a numeral centered there could be without poking past an edge.
  let minDist = Infinity;
  const n = points.length;
  for (let i = 0; i < n; i++) {
    const [ax, ay] = points[i];
    const [bx, by] = points[(i + 1) % n];
    minDist = Math.min(minDist, pointToSegmentDist(px, py, ax, ay, bx, by));
  }
  return minDist;
}

function drawFaceFill(ctx, die, face, rotVerts, cx, cy, scale, dieOpacity) {
  const projected = face._projVerts;
  for (let i = 0; i < rotVerts.length; i++) {
    const p = projectPoint(rotVerts[i], cx, cy, scale);
    projected[i][0] = p[0];
    projected[i][1] = p[1];
  }

  // Dice belonging to the currently non-cream side of an advantage/
  // disadvantage roll render in an inverted dark scheme — black body,
  // light numerals — purely so it's visually obvious at a glance which
  // physical group is which while both are tumbling side by side. Every
  // other die (normal rolls, or the cream-holding side) uses the usual
  // felt-cream body. See advCreamRole for how the assignment persists.
  const isDark = die.colorScheme === 'dark';

  ctx.beginPath();
  for (let i = 0; i < projected.length; i++) {
    if (i === 0) ctx.moveTo(projected[i][0], projected[i][1]);
    else ctx.lineTo(projected[i][0], projected[i][1]);
  }
  ctx.closePath();
  ctx.globalAlpha = dieOpacity;
  ctx.fillStyle = isDark ? '#161616' : '#f4ead2';
  ctx.fill();
  ctx.globalAlpha = 1;
}

// Stroking every face's outline only after every face has already been
// filled (see the two separate passes in drawDie) keeps shared edges
// between adjacent faces crisp and even — filling face B right after
// stroking face A would unevenly paint over part of A's stroke along
// their shared edge, which is what previously made outline seams look like
// they were poking outside the die's true silhouette.
function drawFaceStroke(ctx, die, face, rotVerts, cx, cy, scale, dieOpacity) {
  const projected = face._projVerts; // already populated by drawFaceFill this frame
  const isDark = die.colorScheme === 'dark';

  ctx.save();
  // Clip stroke to the face polygon so shared-edge strokes and perspective
  // foreshortening can never paint a line outside the die's true silhouette.
  ctx.beginPath();
  for (let i = 0; i < projected.length; i++) {
    if (i === 0) ctx.moveTo(projected[i][0], projected[i][1]);
    else ctx.lineTo(projected[i][0], projected[i][1]);
  }
  ctx.closePath();
  ctx.clip();

  ctx.beginPath();
  for (let i = 0; i < projected.length; i++) {
    if (i === 0) ctx.moveTo(projected[i][0], projected[i][1]);
    else ctx.lineTo(projected[i][0], projected[i][1]);
  }
  ctx.closePath();
  ctx.globalAlpha = dieOpacity;
  ctx.lineWidth = 1.8; // clipped to the face polygon, so this reads finer than the number suggests
  ctx.strokeStyle = isDark ? 'rgba(244,234,210,0.55)' : '#0f2a20';
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawFaceNumeral(ctx, die, face, rotCentroid, rotUp, rotVerts, cx, cy, scale, dieOpacity) {
  const projected = face._projVerts; // already populated by drawFaceFill this frame
  const isDark = die.colorScheme === 'dark';
  const [centerX, centerY] = projectPoint(rotCentroid, cx, cy, scale);

  // Numerals are sized per-face, every frame, to the face's actual on-screen
  // shape — not a fixed constant. A d20's small triangles and a d6's larger
  // squares (and the same face foreshortened by perspective at an angle)
  // all render at very different projected sizes, so a single fixed font
  // size will fit some and overflow others. Sizing from the true projected
  // inradius keeps the numeral inside its face's edges in every case.
  const inradius = polygonInradiusFromPoint(centerX, centerY, projected);
  const fontSize = Math.max(6, Math.min(17, inradius * 1.35));


  // Numerals use the same ink colour on every face at all times — no grey
  // "muted" variant for non-result faces after settling. Opacity still fades
  // with the face's apparent size so very edge-on faces recede naturally,
  // but the colour itself is always the full-contrast ink.
  const fillColor = isDark ? '#f4ead2' : '#0f2a20';
  const FADE_LOW = 2.5, FADE_HIGH = 6, MIN_OPACITY = 0.75;
  const fadeT = inradius <= FADE_LOW ? 0 : inradius >= FADE_HIGH ? 1 : (inradius - FADE_LOW) / (FADE_HIGH - FADE_LOW);
  const opacity = (MIN_OPACITY + fadeT * (1 - MIN_OPACITY)) * dieOpacity;
  if (opacity <= 0.01) return;

  ctx.font = `700 ${fontSize}px 'JetBrains Mono', monospace`;
  const angle = numeralRotationRad(rotUp);
  ctx.save();
  // Clip to the face polygon first so numerals on foreshortened or edge-on
  // faces can never bleed outside their own face boundary.
  ctx.beginPath();
  for (let i = 0; i < projected.length; i++) {
    if (i === 0) ctx.moveTo(projected[i][0], projected[i][1]);
    else ctx.lineTo(projected[i][0], projected[i][1]);
  }
  ctx.closePath();
  ctx.clip();
  ctx.translate(centerX, centerY);
  ctx.rotate(angle);
  ctx.globalAlpha = opacity;
  ctx.fillStyle = fillColor;
  ctx.fillText(face.label, 0, 1);
  ctx.globalAlpha = 1;
  ctx.restore();
}

function updateCountLabel() {
  document.getElementById('count-label').textContent = `${totalCount()} / 20 on the felt`;
}

function updateGroupList() {
  const el = document.getElementById('group-list');
  el.innerHTML = '';
  const counts = poolCounts();
  DIE_TYPES.filter((s) => counts[s] > 0).forEach((sides) => {
    const chip = document.createElement('div');
    chip.className = 'group-chip';
    chip.innerHTML = `<span class="tag">d${sides}</span><span>\u00d7${counts[sides]}</span>`;
    const minus = document.createElement('button');
    minus.textContent = '\u2212';
    minus.setAttribute('aria-label', `Remove one d${sides}`);
    minus.onclick = () => removeOne(sides);
    minus.disabled = rolling;
    const plus = document.createElement('button');
    plus.textContent = '+';
    plus.setAttribute('aria-label', `Add one d${sides}`);
    plus.onclick = () => addOne(sides);
    plus.disabled = rolling;
    chip.appendChild(minus);
    chip.appendChild(plus);
    el.appendChild(chip);
  });
}

function setGroupChipsDisabled(disabled) {
  document.querySelectorAll('.group-chip button').forEach((b) => { b.disabled = disabled; });
}

function addOne(sides) {
  if (rolling) return;
  if (sides === 100) {
    // A d100 is read off a d00 (tens) die and a d10 (units) die together,
    // so adding a d100 to the tray only makes sense paired with a d10.
    if (totalCount() + 2 > 20) return;
    order.push(100, 10);
  } else {
    if (totalCount() >= 20) return;
    order.push(sides);
  }
  rebuildField();
}
function removeOne(sides) {
  if (rolling) return;
  const idx = order.lastIndexOf(sides);
  if (idx === -1) return;
  order.splice(idx, 1);
  if (sides === 100) {
    // d100 and its companion d10 were added as a pair; remove one d10 too.
    const tenIdx = order.lastIndexOf(10);
    if (tenIdx !== -1) order.splice(tenIdx, 1);
  }
  rebuildField();
}
function clearAll() {
  if (rolling) return;
  order = [];
  rebuildField();
  // Reset the total readout to its initial placeholder, same markup as on
  // page load — recent-rolls history is left untouched, since "clear tray"
  // is about the dice currently on the felt, not the log of past rolls.
  document.getElementById('roll-total').innerHTML =
    '<span class="total-number is-placeholder">&mdash;</span><span class="total-caption">total appears here after rolling</span>';
}

/* =========================================================================
   PICKER BUTTONS
   ========================================================================= */
const pickerEl = document.getElementById('picker');
DIE_TYPES.forEach((sides) => {
  const btn = document.createElement('button');
  btn.className = 'picker-btn';
  btn.innerHTML = `${dieIconSvg(sides)}<span>+ d${sides}</span>`;
  btn.dataset.sides = String(sides);
  btn.onclick = () => addOne(sides);
  pickerEl.appendChild(btn);
});
const clearBtn = document.getElementById('clear-btn');
clearBtn.onclick = clearAll;

function refreshPickerDisabled() {
  const atMax = totalCount() >= 20;
  const noRoomForPair = totalCount() >= 19; // d100 takes 2 slots (itself + its d10)
  pickerEl.querySelectorAll('.picker-btn').forEach((b) => {
    const needsPair = b.dataset.sides === '100';
    b.disabled = rolling || (needsPair ? noRoomForPair : atMax);
  });
  clearBtn.disabled = totalCount() === 0 || rolling;
}

// Advantage/Disadvantage now apply to the whole tray (every die gets
// rolled twice, keeping the better/worse result die-for-die) rather than
// being d20-specific, so they're available any time there's at least one
// die on the felt — same condition as "Roll the tray" itself.
function refreshAdvantageButtons() {
  const show = dice.length > 0;
  const advBtn = document.getElementById('advantage-btn');
  const disadvBtn = document.getElementById('disadvantage-btn');
  advBtn.disabled = rolling || !show;
  disadvBtn.disabled = rolling || !show;
}

/* =========================================================================
   ROLLING — value decided instantly by crypto RNG. The visual tumble is
   animated frame-by-frame through several random intermediate orientations
   (waypoints), then a final, exactly-solved settle orientation that brings
   the rolled face flat and right-way-up to the camera, computed fresh from
   wherever the tumble actually ends up — not baked into a single CSS
   transition target, which can't represent "how many times it spun."
   ========================================================================= */
function buildTumbleWaypoints(startQuat, sides, finalSolver) {
  // The coin (d2) keeps a busier 15-waypoint tumble — it's a thin disc, so
  // it needs more flips to read clearly as "tumbling" rather than just
  // wobbling once or twice. Every other die uses 6, a calmer roll. To
  // restore a random range scaled the same way as the old 15, swap a
  // count below for: Math.floor(rollFloat(9, 18)) or Math.floor(rollFloat(3, 7)).
  const waypointCount = sides === 2 ? Math.floor(rollFloat(12, 20)) : Math.floor(rollFloat(6, 9));
  const quats = [startQuat];
  let current = startQuat;

  // Each tumble leg's rotation axis is chosen in world/camera space (since
  // it's applied via quatMultiply(step, current) — left-multiplied, i.e.
  // before the die's own existing rotation — so "world space" really does
  // mean "camera space" here, the same frame solveSettleFromQuat uses when
  // it targets [0,0,1] as the camera-facing direction).
  //
  // An axis lying in the camera's XY-plane (roughly perpendicular to the
  // view direction) makes the die tip end-over-end — a face you can see
  // swings away and a new one swings into view: a "flip". An axis aligned
  // with Z (straight toward/away from the camera) instead spins the die
  // like a record on a turntable — the face you're looking at just rotates
  // in place without ever being replaced: a "precession" or in-place spin.
  // FLIP_BIAS shrinks the Z-component of every randomly chosen axis before
  // normalizing, so legs lean heavily toward flipping and rarely toward
  // spinning flat. 1 = no bias (original uniform-sphere behavior), 0 =
  // axis always exactly in-plane (pure flip, never any twirl at all).
  const FLIP_BIAS = 0.18;

  for (let i = 0; i < waypointCount; i++) {
    const axis = [rollFloat(-1, 1), rollFloat(-1, 1), rollFloat(-1, 1) * FLIP_BIAS];
    const len = Math.hypot(...axis) || 1;
    const axisN = axis.map((v) => v / len);
    const angle = rollFloat(140, 260); // big jump per leg so it reads as tumbling
    const step = quatFromAxisAngle(axisN, angle);
    current = quatMultiply(step, current);
    quats.push(current);
  }
  // Final waypoint: solved exactly from wherever the tumble left off, so the
  // rolled face ends up correctly oriented regardless of the random path.
  const finalQuat = finalSolver(current);
  quats.push(finalQuat);
  return quats;
}

function solveSettleFromQuat(currentQuat, faceNormal, faceUp) {
  const currentMat = quatToMatrix(currentQuat);
  const target = [0, 0, 1];
  const targetUp = [0, 1, 0];

  const curNormal = applyMatrixToVector(currentMat, faceNormal);
  const curUp = applyMatrixToVector(currentMat, faceUp);

  const settleMat = rotationToAlign(curNormal, target);
  const settleQuat = matrixToQuaternion(settleMat);
  const settledUp = applyMatrixToVector(settleMat, curUp);

  const dotST = settledUp[0]*target[0] + settledUp[1]*target[1] + settledUp[2]*target[2];
  const proj = settledUp.map((v, idx) => v - dotST * target[idx]);
  const projLen = Math.hypot(...proj) || 1;
  const projN = proj.map((v) => v / projLen);
  const twistMat = rotationAroundAxis(target, projN, targetUp);
  const twistQuat = matrixToQuaternion(twistMat);

  return quatMultiply(twistQuat, quatMultiply(settleQuat, currentQuat));
}

function quatAngleBetween(a, b) {
  let dot = a[0]*b[0] + a[1]*b[1] + a[2]*b[2] + a[3]*b[3];
  dot = Math.min(1, Math.abs(dot));
  return 2 * Math.acos(dot);
}

function easeOutSettle(t) { return 1 - Math.pow(1 - t, 3); }
// Blends linear motion with smoothstep, weighted mostly toward linear.
// Pure smoothstep (t*t*(3-2t)) has zero velocity at both t=0 and t=1 of
// every leg — which looked like the die actually pausing mid-air several
// times per roll, since each leg boundary is a real momentary stop. This
// keeps velocity continuous across leg boundaries (no instant snap to a
// different speed) while never actually reaching zero, so the die keeps
// moving through every direction change instead of stopping for it.
function easeInOutTumble(t) {
  const smooth = t * t * (3 - 2 * t);
  const blend = 0.25; // how much rounding vs. pure constant-rate motion
  return (1 - blend) * t + blend * smooth;
}

function buildRollAnimState(die, waypoints, totalDurationMs) {
  const legCount = waypoints.length - 1;
  const tumbleLegCount = legCount - 1; // all legs except the final settle

  // Size each tumble leg's duration by its actual angular distance, so the
  // die spins at one consistent speed across the whole tumble instead of
  // potentially speeding up or slowing down leg to leg. The final settle
  // leg gets its own fixed share so it reads as a deliberate landing.
  const finalLegShare = 0.32; // fraction of total time spent landing
  const tumbleTotalMs = totalDurationMs * (1 - finalLegShare);
  const finalLegDuration = totalDurationMs * finalLegShare;

  const tumbleAngles = [];
  let angleSum = 0;
  for (let i = 0; i < tumbleLegCount; i++) {
    const a = quatAngleBetween(waypoints[i], waypoints[i + 1]);
    tumbleAngles.push(a);
    angleSum += a;
  }
  const legDurations = tumbleAngles.map((a) =>
    angleSum > 0 ? (a / angleSum) * tumbleTotalMs : tumbleTotalMs / tumbleLegCount
  );
  legDurations.push(finalLegDuration);

  return {
    die,
    waypoints,
    legDurations,
    legCount,
    legIndex: 0,
    legStart: 0, // set when the shared driver starts
    done: false,
  };
}

function stepRollAnim(state, now) {
  if (state.done) return;
  const { die, waypoints, legDurations, legCount } = state;
  const elapsed = now - state.legStart;
  const dur = legDurations[state.legIndex];
  const t = Math.min(1, elapsed / dur);
  const isFinalLeg = state.legIndex === legCount - 1;
  const easedT = isFinalLeg ? easeOutSettle(t) : easeInOutTumble(t);
  const q = quatSlerp(waypoints[state.legIndex], waypoints[state.legIndex + 1], easedT);
  die.currentQuat = q;

  if (t >= 1) {
    state.legIndex++;
    state.legStart = now;
    if (state.legIndex >= legCount) {
      die.currentQuat = waypoints[waypoints.length - 1];
      state.done = true;
    }
  }
}

function runRollAnimations(states, onAllDone) {
  const now0 = performance.now();
  states.forEach((s) => { s.legStart = now0; });

  function frame(now) {
    let anyRunning = false;
    states.forEach((s) => {
      if (!s.done) {
        stepRollAnim(s, now);
        if (!s.done) anyRunning = true;
      }
    });
    renderDiceCanvas(); // one redraw per frame total, regardless of dice count
    if (anyRunning) {
      requestAnimationFrame(frame);
    } else {
      onAllDone();
    }
  }
  requestAnimationFrame(frame);
}

// Runs the tumble animation for exactly the given dice and calls
// onAllSettled() once every one of them has landed — d.value/settled/
// rolledLabel are all set by the time it fires. This is deliberately the
// ONLY thing this helper does: no rolling-flag bookkeeping, no UI
// disabling, no scoring. rollDice (normal "Roll the tray") and
// rollAdvantage (Advantage/Disadvantage, which needs a pause and a
// collapse animation in between settling and scoring) both build on this
// shared core rather than duplicating the tumble pipeline.
function animateTumbleAndSettle(diceToRoll, onAllSettled) {
  const results = diceToRoll.map((d) => {
    d.settled = false;
    const value = rollDie(d.sides === 100 ? 10 : d.sides);
    let label, displayValue;
    if (d.sides === 100) {
      // The tens die's faces read 00,10,20...90. Its numeric contribution
      // to the percentile sum is the tens digit only (00 contributes 0;
      // the combined pair turning "00 + 0" into 100 is handled separately,
      // where the two dice are added together — see percentileValue()).
      displayValue = value === 10 ? 0 : value * 10;
      label = value === 10 ? '00' : String(value * 10);
    } else if (d.sides === 10 && !d.isPercentileUnit) {
      // Standalone d10: the '0' face counts as 10, displayed as '10'.
      displayValue = value === 10 ? 10 : value;
      label = value === 10 ? '10' : String(value);
    } else if (d.sides === 10 && d.isPercentileUnit) {
      // Units die in a d100 pair: '0' face stays 0 (00+0 = 100 handled by percentileValueOf).
      displayValue = value === 10 ? 0 : value;
      label = value === 10 ? '0' : String(value);
    } else {
      displayValue = value;
      label = String(value);
    }
    return { value: displayValue, label };
  });

  const animStates = diceToRoll.map((d, i) => {
    const face = d.faceByLabel[results[i].label];
    const waypoints = buildTumbleWaypoints(d.currentQuat, d.sides, (fromQuat) =>
      solveSettleFromQuat(fromQuat, face.normal, face.up)
    );
    // Each die gets its own random duration (2–3 s) so dice don't all land
    // in unison — staggered landings make a tray feel more physical.
    const rollDurationMs = rollFloat(2000, 3000);
    return buildRollAnimState(d, waypoints, rollDurationMs);
  });

  runRollAnimations(animStates, () => {
    diceToRoll.forEach((d, i) => {
      d.value = results[i].value;
      d.settled = true;
      d.rolledLabel = results[i].label;
    });
    onAllSettled();
  });
}

function rollDice(diceToRoll, onSettled) {
  if (rolling || diceToRoll.length === 0) return;
  rolling = true;
  const rollBtn = document.getElementById('roll-btn');
  rollBtn.textContent = 'Rolling\u2026';
  rollBtn.disabled = true;
  refreshPickerDisabled();
  refreshAdvantageButtons();
  setGroupChipsDisabled(true);
  setModifierDisabled(true);
  const modifier = getModifierValue(); // frozen at roll-start, in case the field is edited mid-animation
  const totalElStart = document.getElementById('roll-total');
  totalElStart.innerHTML = '<span class="total-number is-placeholder">&mdash;</span><span class="total-caption">rolling\u2026</span>';

  animateTumbleAndSettle(diceToRoll, finishRoll);

  function finishRoll() {
    if (onSettled) onSettled();
    rolling = false;
    rollBtn.textContent = 'Roll the tray';
    rollBtn.disabled = false;
    refreshPickerDisabled();
    refreshAdvantageButtons();
    setGroupChipsDisabled(false);
    setModifierDisabled(false);
    scoreAndRecordRoll(modifier);
  }
}

function roll() {
  rollDice(dice);
}

// Builds the doubled set for an Advantage/Disadvantage roll: walks the
// current felt in order and, for every die, creates a fresh duplicate via
// buildFreshDie — a percentile pair (d100 + its companion d10) is doubled
// as one unit, since "00 + 6" only means something as a combined pair, not
// as two independent numbers (see the percentileValue scoring logic).
// Returns { doubledDice, groups }: doubledDice is the full set to hand to
// animateTumbleAndSettle (original + duplicate for everything, in the same
// relative order the felt will lay them out in), and groups is the
// ordered list layoutDoubledGrid/the collapse step need to know which
// original pairs with which duplicate.
function buildAdvantageGroups() {
  const doubledDice = [];
  const groups = [];
  let pairCounter = 1000000; // well clear of rebuildField's own pairId counter, so a duplicated percentile pair never collides with another pair's id mid-roll

  // The role currently NOT holding cream gets the inverted dark scheme for
  // this roll — see advCreamRole above for how that assignment persists
  // and changes between rolls.
  const schemeFor = (role) => (role === advCreamRole ? 'cream' : 'dark');

  dice.forEach((die) => {
    if (die.isPercentileUnit) return; // handled alongside its tens-die owner below

    die.advRole = 'original';
    die.colorScheme = schemeFor('original');

    if (die.sides === 100) {
      die.unitDie.advRole = 'original';
      die.unitDie.colorScheme = schemeFor('original');

      const dupTens = buildFreshDie(100);
      const dupUnits = buildFreshDie(10, true);
      const newPairId = pairCounter++;
      dupTens.pairId = newPairId;
      dupUnits.pairId = newPairId;
      dupUnits.isPercentileUnit = true;
      dupTens.unitDie = dupUnits;
      dupTens.advRole = 'duplicate';
      dupUnits.advRole = 'duplicate';
      dupTens.colorScheme = schemeFor('duplicate');
      dupUnits.colorScheme = schemeFor('duplicate');

      doubledDice.push(die, die.unitDie, dupTens, dupUnits);
      groups.push({
        kind: 'percentile',
        original: { tens: die, units: die.unitDie },
        duplicate: { tens: dupTens, units: dupUnits },
      });
    } else {
      const duplicate = buildFreshDie(die.sides);
      duplicate.advRole = 'duplicate';
      duplicate.colorScheme = schemeFor('duplicate');
      doubledDice.push(die, duplicate);
      groups.push({ kind: 'single', original: die, duplicate });
    }
  });

  return { doubledDice, groups };
}

// Animates every die in `pairs` sliding from its current screenX/Y toward
// its stored _collapseFinalX/Y (set by layoutDoubledGrid) while losing
// dice fade out via drawOpacity. Reuses the same requestAnimationFrame
// driver shape as runRollAnimations, but operates on screen position/
// opacity instead of quaternion rotation — there's no tumbling here, just
// a slide-and-settle, since the dice have already landed on their values.
function runCollapseAnimation(winners, losers, durationMs, onDone) {
  const COLLAPSE_DURATION_MS = durationMs;
  const startPositions = new Map();
  winners.forEach((d) => startPositions.set(d, { x: d.screenX, y: d.screenY, scale: d.drawScale }));
  losers.forEach((d) => startPositions.set(d, { x: d.screenX, y: d.screenY, scale: d.drawScale }));

  const startTime = performance.now();

  function frame(now) {
    const t = Math.min(1, (now - startTime) / COLLAPSE_DURATION_MS);
    const eased = easeOutSettle(t);

    winners.forEach((d) => {
      const start = startPositions.get(d);
      d.screenX = start.x + (d._collapseFinalX - start.x) * eased;
      d.screenY = start.y + (d._collapseFinalY - start.y) * eased;
      d.drawScale = start.scale + (d._collapseFinalScale - start.scale) * eased;
    });
    losers.forEach((d) => {
      // Losers fade out in place rather than sliding anywhere — they're
      // leaving the felt entirely, so there's no final position for them
      // to slide toward; a fade reads clearly as "this one's gone" without
      // implying it's headed somewhere in particular.
      d.drawOpacity = 1 - eased;
    });

    renderDiceCanvas();
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      onDone();
    }
  }
  requestAnimationFrame(frame);
}

// Advantage/Disadvantage now apply to the WHOLE tray: every die (and every
// percentile pair, doubled as a unit) is rolled twice. Unlike a plain
// "keep the better of each individual die" approach, the two sides are
// compared as whole GROUPS — every original die's value is summed into one
// total, every duplicate's value into another, and whichever side's total
// is better (Advantage) or worse (Disadvantage) is kept in its entirety.
// You can't end up with a mix-and-match result cherry-picking the best
// individual die from each side; it's "this whole roll" vs "that whole
// roll", same as physically rolling the entire tray twice and picking one
// full set. The sequence is: lay out a doubled grid (each die's slot
// splits into two adjacent cells, shifting everything after it along — see
// layoutDoubledGrid) → tumble all of them at once → a short pause so the
// result is readable → the losing side's dice fade out while the winning
// side slides into its final single-row position → only then is the
// losing side actually removed and the roll scored, same as a normal roll
// otherwise. None of the duplicates are ever written to `order`, so the
// tray's saved composition is untouched once the dust settles.
function rollAdvantage(keepHigh) {
  if (rolling || dice.length === 0) return;
  rolling = true;
  const rollBtn = document.getElementById('roll-btn');
  const advBtn = document.getElementById('advantage-btn');
  const disadvBtn = document.getElementById('disadvantage-btn');
  rollBtn.disabled = true;
  advBtn.disabled = true;
  disadvBtn.disabled = true;
  refreshPickerDisabled();
  setGroupChipsDisabled(true);
  setModifierDisabled(true);
  const modifier = getModifierValue(); // frozen at roll-start, same as a normal roll
  const totalElStart = document.getElementById('roll-total');
  totalElStart.innerHTML = '<span class="total-number is-placeholder">&mdash;</span><span class="total-caption">rolling\u2026</span>';

  const { doubledDice, groups } = buildAdvantageGroups();
  dice = doubledDice;
  layoutDoubledGrid(groups);
  renderDiceCanvas();

  animateTumbleAndSettle(dice, () => {
    const PAUSE_MS = 650; // long enough to read both results before the loser vanishes
    setTimeout(() => {
      // A single die's contribution to its side's total, or a percentile
      // pair's combined value — same rule scoreAndRecordRoll uses, kept in
      // sync so "which side wins" and "what the winning side scores" are
      // never computed two different ways.
      const groupValue = (member) => {
        const v = member.tens !== undefined ? percentileValueOf(member.tens, member.units) : member.value;
        return v === null ? 0 : v; // defensive: every die has settled by this point, so v should never actually be null
      };

      let originalTotal = 0;
      let duplicateTotal = 0;
      groups.forEach((group) => {
        originalTotal += groupValue(group.original);
        duplicateTotal += groupValue(group.duplicate);
      });

      const originalWins = keepHigh ? originalTotal >= duplicateTotal : originalTotal <= duplicateTotal;
      const winningRole = originalWins ? 'original' : 'duplicate';

      const winners = [];
      const losers = [];
      groups.forEach((group) => {
        const winnerMember = originalWins ? group.original : group.duplicate;
        const loserMember = originalWins ? group.duplicate : group.original;
        if (group.kind === 'percentile') {
          winners.push(winnerMember.tens, winnerMember.units);
          losers.push(loserMember.tens, loserMember.units);
        } else {
          winners.push(winnerMember);
          losers.push(loserMember);
        }
      });

      // Cream always follows the winner: if the dark-styled side just won,
      // cream moves to that role for next time; if the cream-styled side
      // won, it keeps holding cream. Either way this is the new "currently
      // favoured" role until the next advantage/disadvantage roll.
      advCreamRole = winningRole;

      const COLLAPSE_MS = 420;
      runCollapseAnimation(winners, losers, COLLAPSE_MS, () => {
        dice = winners;
        // Winners keep whatever colour scheme they actually won with — if
        // the dark/duplicate side won, those dice stay visually dark on
        // the felt, not just tracked internally, right up until the next
        // Advantage/Disadvantage roll changes who's dark and who's cream.
        // A plain "Roll the tray" never touches colorScheme at all, so
        // this persists through ordinary rolls and rerolls too.
        layoutDiceGrid();
        renderDiceCanvas();

        rolling = false;
        rollBtn.disabled = false;
        advBtn.disabled = false;
        disadvBtn.disabled = false;
        refreshPickerDisabled();
        refreshAdvantageButtons();
        setGroupChipsDisabled(false);
        setModifierDisabled(false);

        scoreAndRecordRoll(modifier);
      });
    }, PAUSE_MS);
  });
}

// Shared by finishRoll (normal rolls) and rollAdvantage (after the
// collapse settles): computes the total/history/caption from whatever is
// currently in `dice` and renders it. Pulled out so both flows score
// exactly the same way rather than keeping two copies of this logic.
function percentileValueOf(tensDie, unitsDie) {
  if (unitsDie.value === null) return null;
  const combined = tensDie.value + unitsDie.value;
  return combined === 0 ? 100 : combined;
}

function scoreAndRecordRoll(modifier) {
  const rolledDice = dice.filter((d) => !d.isPercentileUnit && d.value !== null);
  const valueOf = (d) => (d.sides === 100 ? percentileValueOf(d, d.unitDie) : d.value);
  const scored = rolledDice.filter((d) => valueOf(d) !== null);

  const bySides = {};
  scored.forEach((d) => {
    bySides[d.sides] = bySides[d.sides] || [];
    bySides[d.sides].push(valueOf(d));
  });
  const diceTotal = scored.reduce((sum, d) => sum + valueOf(d), 0);
  const total = diceTotal + modifier;
  const summary = DIE_TYPES.filter((s) => bySides[s]).map((s) => `d${s}: ${bySides[s].join(', ')}`).join('   ');

  history.unshift({ summary, total, n: scored.length, modifier });
  history = history.slice(0, 6);
  renderHistory();

  const captionExtra = modifier !== 0 ? ` (${diceTotal} ${formatModifier(modifier)})` : '';
  const totalEl = document.getElementById('roll-total');
  totalEl.innerHTML = `<span class="total-number">${total}</span><span class="total-caption">total across ${scored.length} ${scored.length === 1 ? 'die' : 'dice'}${captionExtra}</span>`;
}

function rerollDie(die) {
  // Tapping either half of a percentile pair rerolls both dice together,
  // since "00" and "6" aren't independent results — they're read as one
  // combined percentile roll, so a reroll has to produce a new one of those,
  // not just replace half of it.
  if (die.pairId !== undefined) {
    const owner = die.isPercentileUnit
      ? dice.find((d) => d.pairId === die.pairId && !d.isPercentileUnit)
      : die;
    rollDice([owner, owner.unitDie]);
    return;
  }
  rollDice([die]);
}

function renderHistory() {
  const wrap = document.getElementById('history');
  const rows = document.getElementById('history-rows');
  if (history.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  rows.innerHTML = '';
  history.forEach((h) => {
    const row = document.createElement('div');
    row.className = 'history-row';
    const modPart = h.modifier ? `   mod ${formatModifier(h.modifier)}` : '';
    row.innerHTML = `<span class="h-summary">${h.summary}${modPart}</span><span class="h-total">= ${h.total}</span>`;
    rows.appendChild(row);
  });
}

document.getElementById('roll-btn').onclick = roll;
document.getElementById('advantage-btn').onclick = () => rollAdvantage(true);
document.getElementById('disadvantage-btn').onclick = () => rollAdvantage(false);

/* =========================================================================
   MODIFIER INPUT — free-form text in, but constrained on every keystroke
   to "optional leading minus, then digits only" so the field never holds
   anything that isn't a valid integer (or a partial state on the way to
   one, like a lone "-" while typing a negative number).
   ========================================================================= */
const modifierInput = document.getElementById('modifier-input');

function sanitizeModifierText(raw) {
  let s = raw.replace(/[^0-9-]/g, ''); // strip anything but digits and minus
  const negative = s.startsWith('-');
  s = s.replace(/-/g, ''); // drop all minus signs, then re-add at most one, at the front
  const core = (negative ? '-' : '') + s;
  // Positive, non-zero values get a leading "+" added back for display —
  // purely cosmetic; getModifierValue() and this function both already
  // treat a leading "+" the same as no sign at all.
  if (!negative && s !== '' && /[1-9]/.test(s)) return '+' + s;
  // The sign itself is never deletable — backspacing away the digits (or
  // trying to clear the field entirely) always leaves at least a bare sign
  // behind rather than an empty box, so there's always a visible +/- to
  // show which way the modifier is currently pointed. Defaults back to "+"
  // (positive) once no sign survives from what was typed, e.g. selecting
  // everything and pressing backspace.
  if (core === '') return '+';
  return core;
}

modifierInput.addEventListener('input', () => {
  const sanitized = sanitizeModifierText(modifierInput.value);
  if (sanitized !== modifierInput.value) modifierInput.value = sanitized;
  updateModifierSignBtn();
});

const modifierSignBtn = document.getElementById('modifier-sign-btn');

// iOS's numeric keypad (inputmode="numeric") never offers a minus key —
// there's no inputmode value that guarantees one — so typing a negative
// modifier on iPhone/iPad is otherwise impossible. This button is the
// actual way to go negative there; it just flips the sign of whatever
// number is currently in the field, working on the value itself rather
// than text-mangling, then runs the result through the same "+" / "-"
// display formatting sanitizeModifierText already applies everywhere else,
// so the field looks identical whether you typed "-3" or tapped the
// button to get there.
modifierSignBtn.addEventListener('click', () => {
  const current = getModifierValue();
  if (current !== 0) {
    // A real nonzero value just flips sign directly — e.g. -5 becomes +5
    // and vice versa, in one tap, which is the common case once a number's
    // already been entered.
    modifierInput.value = sanitizeModifierText(String(-current));
  } else {
    // At zero there's no numeric sign to flip, but the field always shows
    // a bare "+" or "-" (see sanitizeModifierText — the sign is never
    // deletable), so tapping just flips that bare sign directly, ready to
    // type digits either way.
    modifierInput.value = modifierInput.value === '-' ? '+' : '-';
  }
  updateModifierSignBtn();
  modifierInput.focus();
});

function updateModifierSignBtn() {
  const value = modifierInput.value.trim();
  modifierSignBtn.classList.toggle('is-negative', value.startsWith('-'));
  modifierSignBtn.classList.toggle('is-positive', value.startsWith('+'));
}
updateModifierSignBtn();

// Used everywhere the modifier needs to be locked during a roll (both the
// text field and the sign-toggle button together), instead of setting
// modifierInput.disabled directly and risking the button being left out
// of sync at some call site.
function setModifierDisabled(disabled) {
  modifierInput.disabled = disabled;
  modifierSignBtn.disabled = disabled;
}

function getModifierValue() {
  const raw = modifierInput.value;
  if (raw === '' || raw === '-' || raw === '+') return 0;
  const n = parseInt(raw, 10);
  return Number.isFinite(n) ? n : 0;
}

function formatModifier(n) {
  return n > 0 ? `+${n}` : String(n); // n <= 0 already reads fine, e.g. "-3" or "0"
}


let resizeRaf = null;
window.addEventListener('resize', () => {
  if (resizeRaf) return;
  resizeRaf = requestAnimationFrame(() => {
    resizeRaf = null;
    layoutDiceGrid();
    renderDiceCanvas();
  });
});

/* =========================================================================
   TAP/CLICK TO REROLL A SINGLE DIE — hit-test the click position against
   every die's screen center (already tracked in die.screenX/screenY for
   layout purposes) and reroll whichever one was tapped. A plain click
   listener picks up both mouse clicks and touch taps with no extra touch
   handling needed, and — per the touch-action note on #dice-canvas above —
   doesn't interfere with vertical scroll-by-touch over the dice area.
   ========================================================================= */
const DIE_HIT_RADIUS = 38; // generous for touch; a bit larger than the die's drawn radius (DIE_SCALE)
const DIE_HIT_RADIUS_PERCENTILE = 24; // smaller/closer-together sub-dice in a percentile pair

document.getElementById('dice-canvas').addEventListener('click', (e) => {
  if (rolling) return; // ignore taps while anything is already mid-roll
  const canvas = document.getElementById('dice-canvas');
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  let closestDie = null;
  let closestDistSq = DIE_HIT_RADIUS * DIE_HIT_RADIUS;
  dice.forEach((die) => {
    const radius = die.pairId !== undefined ? DIE_HIT_RADIUS_PERCENTILE : DIE_HIT_RADIUS;
    const dx = die.screenX - x, dy = die.screenY - y;
    const distSq = dx * dx + dy * dy;
    if (distSq <= radius * radius && distSq <= closestDistSq) {
      closestDistSq = distSq;
      closestDie = die;
    }
  });

  if (closestDie) rerollDie(closestDie);
});

/* =========================================================================
   INIT
   ========================================================================= */
rebuildField();
</script>
</body>
